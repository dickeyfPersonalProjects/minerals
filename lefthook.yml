# Local-only git hooks (mi-cyb, mi-c0v).
#
# Opt-in per clone via `make hooks-install`. Closes the worktree-skips-hooks
# gap by enforcing `make fmt-check` before commit and `make ci-quick` before
# push (the fast CI-parity subset), without requiring developers to remember.
#
# CI runs the same gates independently — see .github/workflows/pr.yml — so
# these hooks are a local convenience, not a load-bearing gate.
#
# Reference: docs/quality/backend-code-quality.md §3.12.

pre-commit:
  parallel: true
  commands:
    fmt-check:
      run: make fmt-check

# `make ci-quick` runs fmt-check, vet, lint, test (race+shuffle),
# fmt-check-frontend, and lint-frontend — the subset cheap enough for
# every push. Full CI parity (vuln scan, license audit, svelte-check,
# frontend tests) is `make ci-local`, intended for pre-`gt done`.
pre-push:
  commands:
    ci-quick:
      run: make ci-quick
