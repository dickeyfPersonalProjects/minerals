version: "2"
run:
  timeout: 5m
linters:
  default: standard
  enable:
    - bodyclose
    - depguard
    - errorlint
    - gocritic
    - gosec
    - misspell
    - noctx
    - prealloc
    - revive
    - sloglint
  exclusions:
    paths:
      - frontend
    rules:
      # noctx in tests adds no value — httptest requests don't traverse a real
      # client and there's no cancellation to honor. The linter's intent is
      # production HTTP code that should plumb context for timeouts/cancellation.
      - path: _test\.go
        linters:
          - noctx
  settings:
    depguard:
      # Mechanically enforces the import-related rules in CONTRACT.md §17.
      # Rules use lax mode so imports not in any deny list are allowed.
      rules:
        no-database-sql:
          list-mode: lax
          deny:
            - pkg: database/sql
              desc: "CONTRACT.md §17: use pgx, not database/sql"
        auth-api-no-math-rand:
          list-mode: lax
          files:
            - "**/internal/auth/**"
            - "**/internal/api/**"
          deny:
            - pkg: math/rand
              desc: "CONTRACT.md §17: use crypto/rand in auth/api code"
    sloglint:
      kv-only: true
      no-mixed-args: true
    revive:
      # revive overrides its default rule set when ANY rule is configured,
      # so we re-list the defaults explicitly and opt out of
      # package-comments. Several files in internal/api/ carry per-file
      # design notes attached to their `package api` declaration —
      # documenting the feature shipped in each file (journal,
      # mineral_species, specimen_collectors). That's more useful than a
      # single "Package api ..." sentence and the rule's churn-for-style
      # cost isn't worth losing those notes.
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
          disabled: true
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
        - name: var-declaration
        - name: var-naming
formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/dickeyfPersonalProjects/minerals
