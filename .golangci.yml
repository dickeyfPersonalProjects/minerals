version: "2"
run:
  timeout: 5m
linters:
  default: standard
  enable:
    - bodyclose
    - depguard
    - errorlint
    - gosec
    - noctx
    - sloglint
  exclusions:
    paths:
      - frontend
    rules:
      # noctx in tests adds no value — httptest requests don't traverse a real
      # client and there's no cancellation to honor. The linter's intent is
      # production HTTP code that should plumb context for timeouts/cancellation.
      - path: _test\.go
        linters:
          - noctx
  settings:
    depguard:
      # Mechanically enforces the import-related rules in CONTRACT.md §17.
      # Rules use lax mode so imports not in any deny list are allowed.
      rules:
        no-database-sql:
          list-mode: lax
          deny:
            - pkg: database/sql
              desc: "CONTRACT.md §17: use pgx, not database/sql"
        auth-api-no-math-rand:
          list-mode: lax
          files:
            - "**/internal/auth/**"
            - "**/internal/api/**"
          deny:
            - pkg: math/rand
              desc: "CONTRACT.md §17: use crypto/rand in auth/api code"
    sloglint:
      kv-only: true
      no-mixed-args: true
formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/dickeyfPersonalProjects/minerals
