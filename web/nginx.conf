# Minimal nginx config for the decoupled minerals SPA (mi-gpyc).
#
# This serves ONLY the static SPA bundle (index.html + /assets/*). It is the
# "single shared source" that fixes the multi-replica per-pod asset-hash skew
# diagnosed in mi-zomq (see docs/design/spa-decoupling.md): every client gets
# ONE consistent build regardless of which backend replica answers /api.
#
# Deliberately tiny — no upstreams, no proxying, no extra modules. The public
# Ingress splits traffic: / and /assets/* land here; /api, /auth, /docs,
# /healthz go to the backend Service (docs/deploy/example/*/ingress-split.yaml).
# Because the SPA and the API share one origin at the Ingress, the backend's
# strict CSP (`connect-src 'self'`) holds with no relaxation.
#
# Runs unprivileged: listens on 8080 (>1024, no NET_BIND_SERVICE), pid + all
# temp paths under /tmp so the container root filesystem can stay read-only
# (securityContext in kustomize/base/web.yaml). nginx:alpine symlinks the
# access/error logs to stdout/stderr, so logging needs no writable path.

worker_processes  auto;
pid               /tmp/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # Correct content-types. The original blank-page bug (mi-zomq) was a
    # `.js` served as text/html → "Failed to load module script: MIME type
    # text/html". mime.types covers the bulk; the `.m?js$` location below
    # FORCES `text/javascript` because nginx:alpine's stock mime.types still
    # maps `.js` → `application/javascript` (functional, but the SPA spec and
    # this bead require text/javascript). nosniff (below) is the belt to that.
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Temp paths under /tmp so the root FS stays read-only.
    client_body_temp_path  /tmp/client_temp;
    proxy_temp_path        /tmp/proxy_temp;
    fastcgi_temp_path      /tmp/fastcgi_temp;
    uwsgi_temp_path        /tmp/uwsgi_temp;
    scgi_temp_path         /tmp/scgi_temp;

    access_log  off;
    error_log   /dev/stderr  warn;

    sendfile    on;
    tcp_nopush  on;

    # gzip on for text-ish assets. Vite already content-hashes and (where
    # configured) pre-minifies; gzip shrinks the JS/CSS/JSON on the wire.
    gzip            on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary       on;
    gzip_types      text/plain
                    text/css
                    text/javascript
                    application/javascript
                    application/json
                    image/svg+xml
                    application/manifest+json;

    # Cache-Control by request path, applied once at server scope so a single
    # `add_header` covers every response (per-location add_header would shadow
    # server-level security headers — nginx's add_header inheritance is
    # all-or-nothing per context). Hashed assets are immutable and cached for
    # a year; index.html and SPA-fallback routes must always be revalidated so
    # a deploy is picked up immediately.
    map $uri $cache_control {
        default       "no-cache";
        ~^/assets/    "public, immutable, max-age=31536000";
    }

    server {
        listen       8080;
        listen       [::]:8080;
        server_name  _;
        root         /usr/share/nginx/html;
        index        index.html;

        # Keep the backend's strict security posture on the static documents
        # too (mi-gpyc: "keep strict CSP intact"). Mirrors internal/api
        # middleware.go cspPolicy. `connect-src 'self'` is valid because the
        # SPA and /api share one origin behind the Ingress.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; style-src-attr 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Cache-Control $cache_control always;

        # ES modules MUST be text/javascript regardless of the base image's
        # stock mime.types (mi-zomq MIME bug). Empty `types {}` + default_type
        # forces it; this location only matches .js/.mjs so nothing else is
        # affected. A regex location wins over the /assets/ prefix below for
        # .js files, and `=404` keeps a stale hash from falling back to HTML.
        # It defines no add_header, so the server-level security + cache
        # headers (including the immutable Cache-Control for /assets/*) are
        # inherited unchanged.
        location ~* \.m?js$ {
            types { }
            default_type text/javascript;
            try_files $uri =404;
        }

        # SPA history fallback: real files are served as-is; unknown client
        # routes fall back to index.html so deep links work. The internal
        # rewrite to /index.html re-evaluates $uri, so it correctly picks up
        # the "no-cache" branch of the map above.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Hashed bundle assets (css/svg/fonts/...) only exist for the current
        # build; a stale path must 404 (NOT fall back to index.html, which is
        # what produced the MIME/blank-page bug). .js/.mjs are handled by the
        # regex location above. The map gives these the immutable cache header.
        location /assets/ {
            try_files $uri =404;
        }
    }
}
