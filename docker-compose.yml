# Dev services per CONTRACT.md §2 (top-level structure) and §3
# (local dev workflow). Defaults match internal/config/config.go
# and the §15 env var inventory.
#
# Two operating modes (CONTRACT §3):
#
#   1. Standard onboarding (full stack):
#        docker compose up -d        # postgres + minio + migrate + app on :8080
#                                     # (admin port also exposed on host :9090)
#
#   2. Hot-reload dev (deps only — host runs `make run` and Vite):
#        docker compose up -d postgres minio
#        # then `make run` and `cd frontend && npm run dev` on the host
#
# Migrations: the `app` service auto-applies pending migrations on
# startup whenever ENV=dev (see cmd/minerals/serve.go autoMigrateDev,
# mi-8ky). This is the bead's "entrypoint shim" choice — preferred over
# a separate `migrate` init container because (a) it keeps the
# Dockerfile's ENTRYPOINT/CMD generic and the runtime image distroless
# (no shell to chain commands), and (b) avoids the
# `service_completed_successfully` dependency pattern that podman-compose
# 1.0.6 doesn't reliably handle. In prod (ENV=prod) the schema is still
# owned by the separate migrate Job per design §6.4 — `serve` does NOT
# auto-migrate there.
#
# Production runs on k3s via kustomize/base/ + a separate GitOps repo;
# this file is dev-only (CONTRACT §2 forbids a prod compose variant).

services:
  postgres:
    image: docker.io/library/postgres:16
    container_name: minerals-postgres
    environment:
      POSTGRES_USER: minerals
      POSTGRES_PASSWORD: minerals
      POSTGRES_DB: minerals
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minerals -d minerals"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    # Pinned tag matches the version used by .github/workflows/main.yml
    # so CI and local dev exercise the same MinIO build. Bumping this
    # is fine, but bump both places together.
    image: docker.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minerals-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    # Built from the local Dockerfile so `docker compose up -d` always
    # runs the working-tree code (no ghcr pull, no version drift).
    # On startup, the binary auto-applies pending migrations because
    # ENV=dev (see header comment).
    build:
      context: .
    image: minerals-app:dev
    container_name: minerals-app
    environment:
      DATABASE_URL: postgres://minerals:minerals@postgres:5432/minerals?sslmode=disable
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: minerals-dev
      ENV: dev
      # Mindat-backed mineral-species lookup (mi-dtg / F-1). Optional:
      # set this to enable Mindat fallthrough on cache misses; without
      # it the app runs in DB-only mode (users enter minerals once and
      # the app remembers them). Get a key at https://www.mindat.org/.
      # MINDAT_API_KEY: ""
      #
      # OIDC dev wiring (mi-dau). PUBLIC_OIDC_* are echoed to the SPA
      # via /api/v1/runtime-config — they MUST be host-side URLs because
      # the browser uses them to reach Keycloak and to compare against
      # the JWT's `iss` claim. OIDC_ISSUER_URL must likewise match the
      # browser-issued token's `iss`. OIDC_JWKS_URL is the in-container
      # path the backend uses to fetch Keycloak's public keys — needed
      # because `localhost:8081` is the container's own loopback, not
      # the host. With JWKS_URL set, the verifier skips OIDC discovery
      # entirely (see internal/oidc/verifier.go), so the issuer URL only
      # needs to be a string match, not reachable from this container.
      #
      # Without `--profile keycloak`, the Keycloak container isn't
      # running and these point at endpoints that won't answer. That's
      # fine: the verifier constructs lazily and does no network I/O
      # at startup, so `docker compose up -d` (no profile) still boots
      # cleanly and serves anonymous routes. Authenticated calls would
      # fail on the first request, but anonymous-only dev still works.
      OIDC_ISSUER_URL: http://localhost:8081/realms/minerals
      OIDC_CLIENT_ID: minerals-frontend
      OIDC_JWKS_URL: http://keycloak:8080/realms/minerals/protocol/openid-connect/certs
      PUBLIC_OIDC_ISSUER_URL: http://localhost:8081/realms/minerals
      PUBLIC_OIDC_CLIENT_ID: minerals-frontend
      PUBLIC_OIDC_REDIRECT_URI: http://localhost:8080/auth/callback
    ports:
      - "8080:8080"
      # Admin listener (mi-2b1k): Prometheus `/metrics` + health probes.
      # Exposed on the host so developers can `curl :9090/metrics` against
      # the dev stack without exec'ing into the container. In prod, this
      # port is in-cluster only (ClusterIP, never on the Ingress).
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Optional Keycloak instance for auth development (mi-pgl, mi-hye).
  # Opt-in via the `keycloak` profile so `docker compose up -d` (no args)
  # does NOT start it. Bound to host :8081 so it can run alongside the
  # `app` service (host :8080) — OIDC dev needs both running together.
  #
  # Host port allocation (avoid collisions when adding new services):
  #   5432 postgres   8080 app         9000 minio (s3)
  #   8081 keycloak   9001 minio (console)
  #
  # Modes:
  #
  #   docker compose --profile keycloak up -d keycloak    # Keycloak alone
  #   docker compose up -d                                # Full stack, then
  #     docker compose --profile keycloak up -d keycloak  # add Keycloak
  #
  # `start-dev` uses an in-memory H2 DB — fine for local dev, no separate
  # Postgres needed. Admin console: http://localhost:8081 (admin/admin).
  # Realm endpoints (issuer, JWKS, etc.) are published at
  # http://localhost:8081 via KC_HOSTNAME so tokens issued match the
  # URL the SPA / terraform / curl reach Keycloak on.
  #
  # The bootstrap admin user is created on first start by
  # KC_BOOTSTRAP_ADMIN_USERNAME / _PASSWORD. Hardcoded admin/admin is
  # intentional — dev-only, never exposed beyond the host. The
  # terraform-managed realm (`terraform/keycloak/dev.tfvars`) targets
  # this instance unchanged.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: minerals-keycloak
    profiles:
      - keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8081
    ports:
      - "8081:8080"

# The minerals-dev bucket is auto-created by the Go binary on dev
# startup (see cmd/minerals/serve.go and internal/storage.EnsureBucket
# per CONTRACT §3, §12). No mc-init sidecar needed.

volumes:
  postgres-data:
  minio-data:
