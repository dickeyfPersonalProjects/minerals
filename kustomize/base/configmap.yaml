# Non-secret env vars for the app, per CONTRACT.md §15.
#
# Secret env vars (DATABASE_URL, S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY) come
# from operator-managed Secrets — see deployment.yaml.
#
# OIDC keys (OIDC_ISSUER_URL, OIDC_CLIENT_ID, PUBLIC_OIDC_ISSUER_URL,
# PUBLIC_OIDC_CLIENT_ID, PUBLIC_OIDC_REDIRECT_URI) are hostname-dependent
# and so live in the per-env overlay rather than the base — see
# docs/deploy/example/{staging,prod}/mineral.yaml for the patch shape, and
# CONFIG.md for the inventory rows.
apiVersion: v1
kind: ConfigMap
metadata:
  name: minerals-config
data:
  PORT: "8080"
  # Operator-facing admin listener (mi-2b1k): serves /metrics + probes.
  # Must match the `admin` containerPort in deployment.yaml.
  ADMIN_PORT: "9090"
  ENV: "prod"
  S3_BUCKET: "minerals"
  S3_REGION: "us-east-1"
  MAX_UPLOAD_BYTES: "104857600"
  LOG_LEVEL: "info"
  # In-cluster MinIO endpoint. The MinIO operator creates a headless service
  # named <tenant>-hl exposing port 9000 directly. Same-namespace short DNS
  # resolves without the .svc.cluster.local suffix; the GitOps overlay can
  # patch this if app and tenant land in different namespaces.
  S3_ENDPOINT: "http://minerals-hl:9000"
