# Non-secret env vars for the app, per CONTRACT.md §15.
#
# Secret env vars (DATABASE_URL, S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY) come
# from operator-managed Secrets — see deployment.yaml.
#
# OIDC keys (OIDC_ISSUER_URL, OIDC_CLIENT_ID, OIDC_REDIRECT_URI)
# are hostname-dependent and so live in the per-env overlay rather than
# the base — see docs/deploy/example/{staging,prod}/mineral.yaml for the
# patch shape, and CONFIG.md for the inventory rows.
apiVersion: v1
kind: ConfigMap
metadata:
  name: minerals-config
data:
  PORT: "8080"
  # Operator-facing admin listener (mi-2b1k): serves /metrics + probes.
  # Must match the `admin` containerPort in deployment.yaml.
  ADMIN_PORT: "9090"
  ENV: "prod"
  S3_BUCKET: "minerals"
  S3_REGION: "us-east-1"
  MAX_UPLOAD_BYTES: "104857600"
  LOG_LEVEL: "info"
  # SPA serving mode (mi-zomq). "embedded" = the backend serves the SPA
  # from its embedded dist/ (v1 single-replica behavior). Flip to
  # "disabled" in the prod overlay ONLY after the decoupled SPA bundle is
  # published to the minerals-web bucket and the ingress routes "/" to it
  # — then the backend serves API/docs/health only and multi-replica
  # asset skew is gone. See docs/design/spa-decoupling.md.
  WEB_SERVE_MODE: "embedded"
  # In-cluster MinIO endpoint. The MinIO operator creates a headless service
  # named <tenant>-hl exposing port 9000 directly. Same-namespace short DNS
  # resolves without the .svc.cluster.local suffix; the GitOps overlay can
  # patch this if app and tenant land in different namespaces.
  S3_ENDPOINT: "http://minerals-hl:9000"
