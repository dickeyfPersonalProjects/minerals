# minerals app — Deployment + migrate initContainer.
#
# v1 is single-overseer / single-replica. Multi-replica is a v2 decision (it
# requires deciding on session/file-lock semantics first).
#
# Image: latest until we cut a tagged release. imagePullPolicy: Always so
# `latest` actually re-pulls on rollout.
#
# Migrations: per CONTRACT.md §6.4, an initContainer running
# `/minerals migrate up` blocks the main container until the schema matches
# the binary. The Job-style alternative is sanctioned but heavier; the
# initContainer fits a single-replica deployment cleanly.
#
# Resource sizing rationale (educated guess; the PR description owes the
# operator a deliberate first guess to push back on):
#   - cpu requests 100m / limits 500m: app is I/O-bound except during photo
#     variant generation, which is briefly CPU-heavy on upload. 500m gives
#     room for a single upload's image-decode burst without throttling other
#     requests.
#   - memory requests 256Mi: Go runtime, connection pools, embedded SPA, and
#     a small working set fit comfortably.
#   - memory limits 1Gi: photo decoding holds the full pixmap in memory; a
#     ~100 MB JPEG decodes to several hundred MB. Variants are generated and
#     held briefly. Tighter than 1Gi will OOM on large uploads; looser is
#     wasteful for the steady state.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minerals
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minerals
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: minerals
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532    # distroless 'nonroot' user
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: migrate
          image: ghcr.io/dickeyfpersonalprojects/minerals:latest
          imagePullPolicy: Always
          command: ["/minerals"]
          args: ["migrate", "up"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: minerals-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: minerals-pg-app
                  key: uri
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m

      containers:
        - name: minerals
          image: ghcr.io/dickeyfpersonalprojects/minerals:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            # Non-secret env (PORT, ENV, S3_BUCKET, S3_REGION, S3_ENDPOINT,
            # MAX_UPLOAD_BYTES, LOG_LEVEL).
            - configMapRef:
                name: minerals-config
            # S3 credentials. The GitOps overlay provides this Secret with
            # keys S3_ACCESS_KEY_ID and S3_SECRET_ACCESS_KEY (named to match
            # what the app reads — no further mapping needed).
            - secretRef:
                name: minerals-s3-creds
          env:
            # CNPG provides the DSN under the `uri` key in its auto-generated
            # app Secret <cluster-name>-app. Map it to DATABASE_URL.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: minerals-pg-app
                  key: uri
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            # Migration runs in initContainer, so the main container starts
            # against a ready DB. 10s gives the app a beat to dial Postgres
            # and MinIO before the first probe.
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 500m
