# CI-only docker-compose override for the Backend JWT acceptance
# test (mi-ivk). Layered on top of docker-compose.yml in the
# `keycloak-smoke` job (display name: "Backend JWT acceptance") of
# pr.yml — NOT used for local dev.
#
# Why this override exists: split-horizon URLs.
#
# In docker-compose.yml the dev Keycloak sets
# `KC_HOSTNAME: http://localhost:8081` so a browser on the host and
# the host-side `terraform`/`curl` all reach it on the same URL the
# issued tokens carry. But CI also needs the `app` *container* to
# verify those tokens — and from inside the compose network
# `localhost:8081` is the app container itself, not Keycloak.
#
# Fix: point KC_HOSTNAME at the in-network name `http://keycloak:8080`
# (the service name + container port). Then:
#   - tokens carry `iss: http://keycloak:8080/realms/minerals`
#   - the app verifies with OIDC_ISSUER_URL=http://keycloak:8080/...,
#     reachable over the compose network — discovery + `iss` match
#   - host-side terraform/curl still reach Keycloak on
#     localhost:8081; `start-dev` runs hostname-strict=false so the
#     admin REST API and token endpoint answer on any host
#
# This split only works because the smoke test never exercises the
# browser PKCE redirect (which would need the host-visible issuer) —
# it uses the direct-access-grant `minerals-test` client instead.

services:
  keycloak:
    environment:
      KC_HOSTNAME: http://keycloak:8080

  app:
    environment:
      # Backend JWT verification target. Must match the token `iss`
      # (set by KC_HOSTNAME above) and be reachable from the app
      # container — both true for the in-network name.
      OIDC_ISSUER_URL: http://keycloak:8080/realms/minerals
