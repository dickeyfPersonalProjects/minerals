name: Main build & publish

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/dickeyfpersonalprojects/minerals

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: minerals
          POSTGRES_PASSWORD: minerals
          POSTGRES_DB: minerals
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U minerals"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://minerals:minerals@localhost:5432/minerals?sslmode=disable
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin

    steps:
      - uses: actions/checkout@v4

      # MinIO is started via `docker run` rather than a GHA service container
      # because the official `minio/minio` image requires `server /data` as its
      # CMD, and GHA service container syntax has no field for CMD/args
      # (`options:` only forwards `docker create` flags like --entrypoint, which
      # cannot supply trailing args). The previously-used `bitnami/minio:latest`
      # tag was removed when Bitnami pulled their public free-tier images.
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            --health-cmd 'curl -fsS http://localhost:9000/minio/health/live || exit 1' \
            --health-interval=5s --health-timeout=3s --health-retries=10 \
            minio/minio:RELEASE.2025-09-07T16-13-09Z \
            server /data

      - name: Wait for MinIO ready
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null; then
              echo "MinIO ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "MinIO did not become ready in 30s" >&2
          docker logs minio >&2 || true
          exit 1

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt check
        run: make SHELL=/bin/bash fmt-check

      - name: go vet
        run: make vet

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          args: --timeout=5m

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Unit tests
        # Combines race detection, shuffled execution, and JUnit output
        # in one invocation per mi-qb3. -race needs CGO_ENABLED=1 (the
        # actions/setup-go@v5 default).
        run: gotestsum --junitfile junit.xml -- -race -shuffle=on ./...

      - name: Upload junit.xml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-junit
          path: junit.xml
          if-no-files-found: ignore

      - name: Detect migrations
        id: migrations
        run: |
          if compgen -G 'migrations/*.up.sql' > /dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Integration tests
        if: steps.migrations.outputs.present == 'true'
        run: make test-integration

      - name: Detect frontend
        id: frontend
        run: |
          if [ -f frontend/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.frontend.outputs.present == 'true'
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend gates
        if: steps.frontend.outputs.present == 'true'
        working-directory: frontend
        run: |
          npm ci
          npx prettier --check .
          npx eslint .
          npx vitest run --reporter=github-actions --reporter=default --coverage

      - name: Upload frontend coverage
        if: steps.frontend.outputs.present == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: ignore

  # Validates the committed docker-compose.yml end-to-end. The `test`
  # job above brings up Postgres + MinIO via GHA service containers
  # (and a `docker run` for MinIO), bypassing the compose file — so a
  # polecat could break compose (versions, ports, credentials, missing
  # services) without CI noticing. This job exercises the file the way
  # a fresh contributor would after `git clone`.
  #
  # Health-check pattern: bounded poll loops on the host (pg_isready
  # for Postgres, curl for MinIO) rather than relying on the compose
  # file's own healthchecks. Polling from the host catches host-port-
  # binding drift that an in-container healthcheck would miss.
  compose-smoke:
    name: Compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: docker compose up
        # Per mi-8ky, the default-mode contract is: this single command
        # brings up postgres + minio + migrate + app, with the app
        # reachable on :8080. The image build for `app` adds ~1-2 min
        # on a cold runner; the bumped timeout-minutes accommodates it.
        run: docker compose up -d

      - name: Wait for Postgres healthy
        run: |
          for i in $(seq 1 60); do
            if pg_isready -h localhost -p 5432 -U minerals -d minerals >/dev/null 2>&1; then
              echo "Postgres ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Postgres did not become ready in 60s" >&2
          docker compose logs postgres >&2 || true
          exit 1

      - name: Wait for MinIO healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null; then
              echo "MinIO ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "MinIO did not become ready in 60s" >&2
          docker compose logs minio >&2 || true
          exit 1

      - name: Postgres smoke (SELECT 1)
        env:
          PGPASSWORD: minerals
        run: psql -h localhost -p 5432 -U minerals -d minerals -c 'SELECT 1;'

      - name: MinIO smoke (health/live)
        run: curl -fsS http://localhost:9000/minio/health/live

      - name: Wait for app /healthz
        # mi-8ky acceptance: default-mode `docker compose up -d` brings
        # the app up too. App auto-applies migrations on dev startup;
        # allow up to 120s for the cold-start chain.
        run: |
          for i in $(seq 1 120); do
            body=$(curl -fsS http://localhost:8080/healthz 2>/dev/null || true)
            if [ "$body" = "ok" ]; then
              echo "App ready after ${i}s (body: ${body})"
              exit 0
            fi
            sleep 1
          done
          echo "App did not respond ok on /healthz in 120s" >&2
          docker compose ps >&2 || true
          docker compose logs app >&2 || true
          exit 1

      - name: docker compose down
        if: always()
        run: docker compose down -v

  image:
    name: Build & push image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Dockerfile
        id: dockerfile
        run: |
          if [ -f Dockerfile ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Dockerfile not yet present — skipping image build"
          fi

      - name: Compute short SHA
        if: steps.dockerfile.outputs.present == 'true'
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        if: steps.dockerfile.outputs.present == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.dockerfile.outputs.present == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.dockerfile.outputs.present == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:staging
            ${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}
