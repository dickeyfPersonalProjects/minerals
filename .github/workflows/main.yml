name: Main build & publish

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/dickeyfpersonalprojects/minerals
  # The decoupled SPA image (mi-gpyc): a minimal nginx-only container built
  # from Dockerfile.web. Published in lockstep with the backend image so a
  # promote can pin both at the same commit (see promote-prod.yml).
  IMAGE_NAME_WEB: ghcr.io/dickeyfpersonalprojects/minerals-web

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: minerals
          POSTGRES_PASSWORD: minerals
          POSTGRES_DB: minerals
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U minerals"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://minerals:minerals@localhost:5432/minerals?sslmode=disable
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin

    steps:
      - uses: actions/checkout@v6

      # MinIO is started via `docker run` rather than a GHA service container
      # because the official `minio/minio` image requires `server /data` as its
      # CMD, and GHA service container syntax has no field for CMD/args
      # (`options:` only forwards `docker create` flags like --entrypoint, which
      # cannot supply trailing args). The previously-used `bitnami/minio:latest`
      # tag was removed when Bitnami pulled their public free-tier images.
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            --health-cmd 'curl -fsS http://localhost:9000/minio/health/live || exit 1' \
            --health-interval=5s --health-timeout=3s --health-retries=10 \
            minio/minio:RELEASE.2025-09-07T16-13-09Z \
            server /data

      - name: Wait for MinIO ready
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null; then
              echo "MinIO ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "MinIO did not become ready in 30s" >&2
          docker logs minio >&2 || true
          exit 1

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt check
        run: make SHELL=/bin/bash fmt-check

      - name: go vet
        run: make vet

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

      # Mechanical enforcement of CONTRACT §16 license allowlist (mi-q7n).
      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: License check
        run: make license-check

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Unit tests
        # Combines race detection, shuffled execution, and JUnit output
        # in one invocation per mi-qb3. -race needs CGO_ENABLED=1 (the
        # actions/setup-go@v6 default).
        run: gotestsum --junitfile junit.xml -- -race -shuffle=on ./...

      # SCA: known CVEs in direct + transitive Go deps, scoped to
      # reachable callgraph (per mi-xql / Q-1 R3).
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck
        run: make vulncheck

      - name: Upload junit.xml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-junit
          path: junit.xml
          if-no-files-found: ignore

      - name: Detect migrations
        id: migrations
        run: |
          if compgen -G 'migrations/*.up.sql' > /dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Integration tests
        if: steps.migrations.outputs.present == 'true'
        run: make test-integration

      - name: Detect frontend
        id: frontend
        run: |
          if [ -f frontend/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v6
        if: steps.frontend.outputs.present == 'true'
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend gates
        if: steps.frontend.outputs.present == 'true'
        working-directory: frontend
        run: |
          npm ci
          npx prettier --check .
          npx eslint .
          npx vitest run --reporter=github-actions --reporter=default --coverage

      - name: Upload frontend coverage
        if: steps.frontend.outputs.present == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: ignore

  # Fuzz smoke (mi-h8j, CONTRACT §17). Runs as its OWN job that is
  # deliberately NOT in the publish dependency chain (detect -> image
  # -> merge gates on `test` only). Rationale (mi-d1bk): the fuzzers
  # are CPU-heavy and non-deterministic, so a runner-perf hiccup can
  # SIGTERM the step (exit 143) with no real bug found. When this step
  # lived inside `test`, that flake failed `test` and blocked the image
  # publish/promote chain — which on 2026-05-22 stalled a P0 prod
  # DB-pool fix (mi-hkh6) mid-incident. Publish must gate only on
  # DETERMINISTIC checks; fuzzing is a non-gating signal.
  #
  # Crash vs. flake: a genuine fuzz-discovered crash makes `go test`
  # write the failing input to testdata/fuzz/<Fuzz>/<id> and print
  # "Failing input written to". A timeout/SIGTERM writes no such file.
  # So this job fails (surfacing a real bug for triage) ONLY when a
  # crash corpus was written; a bare timeout is logged as a warning and
  # left green. `go test -fuzz` is single-package, so each harness is
  # invoked separately. Pure parser fuzzers — no Postgres/MinIO needed.
  fuzz-smoke:
    name: Fuzz smoke (non-gating)
    runs-on: ubuntu-latest
    # Generous headroom so the JOB timeout itself never becomes the gate
    # we just removed: baseline-coverage build + 2×30s fuzztime + overhead.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: fuzz-smoke
        run: |
          set +e
          real_crash=0
          run_fuzz() {
            name="$1"; pkg="$2"
            echo "::group::${name} (${pkg})"
            out="$(go test -run='^$' -fuzz="${name}" -fuzztime=30s "${pkg}" 2>&1)"
            rc=$?
            printf '%s\n' "$out"
            echo "::endgroup::"
            if [ "$rc" -ne 0 ]; then
              if printf '%s\n' "$out" | grep -q 'Failing input written to'; then
                echo "::error::${name} found a crash (corpus written) — commit the seed under testdata/fuzz and fix the parser"
                real_crash=1
              else
                echo "::warning::${name} exited ${rc} with no failing input (timeout/SIGTERM flake) — not failing the job"
              fi
            fi
          }
          run_fuzz FuzzRender ./internal/markdown
          run_fuzz FuzzParseExif ./internal/storage/exif
          exit "${real_crash}"

  # Validates the committed docker-compose.yml end-to-end. The `test`
  # job above brings up Postgres + MinIO via GHA service containers
  # (and a `docker run` for MinIO), bypassing the compose file — so a
  # polecat could break compose (versions, ports, credentials, missing
  # services) without CI noticing. This job exercises the file the way
  # a fresh contributor would after `git clone`.
  #
  # Health-check pattern: bounded poll loops on the host (pg_isready
  # for Postgres, curl for MinIO) rather than relying on the compose
  # file's own healthchecks. Polling from the host catches host-port-
  # binding drift that an in-container healthcheck would miss.
  compose-smoke:
    name: Compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: docker compose up
        # Per mi-8ky, the default-mode contract is: this single command
        # brings up postgres + minio + migrate + app, with the app
        # reachable on :8080. The image build for `app` adds ~1-2 min
        # on a cold runner; the bumped timeout-minutes accommodates it.
        run: docker compose up -d

      - name: Wait for Postgres healthy
        run: |
          for i in $(seq 1 60); do
            if pg_isready -h localhost -p 5432 -U minerals -d minerals >/dev/null 2>&1; then
              echo "Postgres ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Postgres did not become ready in 60s" >&2
          docker compose logs postgres >&2 || true
          exit 1

      - name: Wait for MinIO healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null; then
              echo "MinIO ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "MinIO did not become ready in 60s" >&2
          docker compose logs minio >&2 || true
          exit 1

      - name: Postgres smoke (SELECT 1)
        env:
          PGPASSWORD: minerals
        run: psql -h localhost -p 5432 -U minerals -d minerals -c 'SELECT 1;'

      - name: MinIO smoke (health/live)
        run: curl -fsS http://localhost:9000/minio/health/live

      - name: Wait for app /healthz
        # mi-8ky acceptance: default-mode `docker compose up -d` brings
        # the app up too. App auto-applies migrations on dev startup;
        # allow up to 120s for the cold-start chain.
        run: |
          for i in $(seq 1 120); do
            body=$(curl -fsS http://localhost:8080/healthz 2>/dev/null || true)
            if [ "$body" = "ok" ]; then
              echo "App ready after ${i}s (body: ${body})"
              exit 0
            fi
            sleep 1
          done
          echo "App did not respond ok on /healthz in 120s" >&2
          docker compose ps >&2 || true
          docker compose logs app >&2 || true
          exit 1

      - name: docker compose down
        if: always()
        run: docker compose down -v

  # Detect Dockerfile presence in a separate job so both the matrix
  # build and the manifest-merge job can gate on the same signal.
  # Multi-arch publish: each arch builds natively on its own runner
  # (no QEMU), pushes by digest, then the merge job composes a
  # multi-arch manifest via `docker buildx imagetools create` (hq-qwi6).
  detect:
    name: Detect Dockerfile
    needs: test
    runs-on: ubuntu-latest
    outputs:
      present: ${{ steps.dockerfile.outputs.present }}
      web: ${{ steps.dockerfile.outputs.web }}
    steps:
      - uses: actions/checkout@v6

      - id: dockerfile
        run: |
          if [ -f Dockerfile ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Dockerfile not yet present — skipping image build"
          fi
          if [ -f Dockerfile.web ]; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "web=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Dockerfile.web not present — skipping minerals-web image build"
          fi

  image:
    name: Build (${{ matrix.platform }})
    needs: detect
    if: needs.detect.outputs.present == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare platform pair
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Deploy markers baked into the image (mi-c0sv): short SHA + ISO 8601
      # build timestamp. GIT_SHA/BUILD_DATE flow into the SPA footer via
      # Vite's `define`; VERSION populates the Go binary's boot `version`
      # log (ldflags -X main.version), matching the :sha-<short> image tag.
      - name: Compute build metadata
        id: meta
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.short_sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VERSION=sha-${{ steps.meta.outputs.short_sha }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Create multi-arch manifest
    needs: [detect, image]
    if: needs.detect.outputs.present == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        env:
          SHORT_SHA: ${{ steps.sha.outputs.short }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:latest" \
            -t "${IMAGE_NAME}:staging" \
            -t "${IMAGE_NAME}:sha-${SHORT_SHA}" \
            $(printf "${IMAGE_NAME}@sha256:%s " *)

      - name: Inspect manifest
        env:
          SHORT_SHA: ${{ steps.sha.outputs.short }}
        run: docker buildx imagetools inspect "${IMAGE_NAME}:sha-${SHORT_SHA}"

  # minerals-web (mi-gpyc): the decoupled SPA's nginx-only image. Mirrors the
  # backend image jobs (native per-arch build → push by digest → multi-arch
  # manifest merge) so both images publish the same tag set (latest/staging/
  # sha-<short>) at every main merge, and promote-prod can pin them together.
  image-web:
    name: Build web (${{ matrix.platform }})
    needs: detect
    if: needs.detect.outputs.web == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare platform pair
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Same deploy markers as the backend image so the SPA footer is
      # identical whether served embedded or from this nginx image.
      - name: Compute build metadata
        id: meta
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          platforms: ${{ matrix.platform }}
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.short_sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          outputs: type=image,name=${{ env.IMAGE_NAME_WEB }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          # Name is intentionally NOT prefixed `digests-`: the backend
          # `merge` job downloads `pattern: digests-*`, and a shared prefix
          # would pull these web digests into the backend manifest.
          name: web-digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-web:
    name: Create web multi-arch manifest
    needs: [detect, image-web]
    if: needs.detect.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: web-digests-*
          merge-multiple: true

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        env:
          SHORT_SHA: ${{ steps.sha.outputs.short }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_NAME_WEB}:latest" \
            -t "${IMAGE_NAME_WEB}:staging" \
            -t "${IMAGE_NAME_WEB}:sha-${SHORT_SHA}" \
            $(printf "${IMAGE_NAME_WEB}@sha256:%s " *)

      - name: Inspect manifest
        env:
          SHORT_SHA: ${{ steps.sha.outputs.short }}
        run: docker buildx imagetools inspect "${IMAGE_NAME_WEB}:sha-${SHORT_SHA}"

  # After a successful push, prune GHCR versions older than the current
  # :prod image (mi-8ba). Skipped when no :prod tag exists yet.
  prune:
    name: Prune older GHCR images
    needs: [detect, merge]
    if: needs.detect.outputs.present == 'true'
    uses: ./.github/workflows/prune-ghcr.yml
    permissions:
      packages: write
    secrets: inherit
