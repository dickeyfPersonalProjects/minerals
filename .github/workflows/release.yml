name: Release tag build & publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/dickeyfpersonalprojects/minerals

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: minerals
          POSTGRES_PASSWORD: minerals
          POSTGRES_DB: minerals
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U minerals"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000

    env:
      DATABASE_URL: postgres://minerals:minerals@localhost:5432/minerals?sslmode=disable
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt check
        run: make SHELL=/bin/bash fmt-check

      - name: go vet
        run: make vet

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          args: --timeout=5m

      - name: Unit tests
        run: make test

      - name: Detect migrations
        id: migrations
        run: |
          if compgen -G 'migrations/*.up.sql' > /dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Integration tests
        if: steps.migrations.outputs.present == 'true'
        run: make test-integration

      - name: Detect frontend
        id: frontend
        run: |
          if [ -f frontend/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.frontend.outputs.present == 'true'
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend gates
        if: steps.frontend.outputs.present == 'true'
        working-directory: frontend
        run: |
          npm ci
          npx prettier --check .
          npx eslint .
          npm test

  image:
    name: Build & push release image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Dockerfile
        id: dockerfile
        run: |
          if [ -f Dockerfile ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Dockerfile not yet present — skipping image build"
          fi

      - name: Compute tag values
        if: steps.dockerfile.outputs.present == 'true'
        id: tags
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          echo "version=${ref}" >> "$GITHUB_OUTPUT"
          echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        if: steps.dockerfile.outputs.present == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.dockerfile.outputs.present == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.dockerfile.outputs.present == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.version }}
            ${{ env.IMAGE_NAME }}:sha-${{ steps.tags.outputs.short }}
            ${{ env.IMAGE_NAME }}:latest
