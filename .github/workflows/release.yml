name: Release tag (retag :prod)

# Promotes the current `:prod` GHCR image to a version tag (e.g. `v1.0.0`)
# via a manifest-only retag. The version image and `:prod` share the same
# manifest digest — no rebuild, no architecture-skew risk.
#
# Triggers:
# - push of a `v*` git tag (canonical release flow)
# - workflow_dispatch with a `version` input (retroactive / manual retag)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to apply to :prod (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/dickeyfpersonalprojects/minerals

jobs:
  retag:
    name: Retag :prod as version
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "${version}" =~ ^v[0-9]+(\.[0-9]+){0,2}([.-].+)?$ ]]; then
            echo "::error::Version '${version}' does not match v<MAJOR>[.<MINOR>[.<PATCH>]][-suffix]"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Version: ${version}"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Inspect :prod manifest digest
        id: src
        run: |
          digest=$(docker buildx imagetools inspect \
            "${IMAGE_NAME}:prod" \
            --format '{{.Manifest.Digest}}')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo ":prod digest: ${digest}"

      - name: Retag :prod as version (manifest-only)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${VERSION}" \
            "${IMAGE_NAME}:prod"

      - name: Inspect version manifest digest
        id: dst
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          digest=$(docker buildx imagetools inspect \
            "${IMAGE_NAME}:${VERSION}" \
            --format '{{.Manifest.Digest}}')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo ":${VERSION} digest: ${digest}"

      - name: Verify digests match
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SRC_DIGEST: ${{ steps.src.outputs.digest }}
          DST_DIGEST: ${{ steps.dst.outputs.digest }}
        run: |
          {
            echo "## Release retag: \`:${VERSION}\`"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Source tag | \`:prod\` |"
            echo "| Source digest | \`${SRC_DIGEST}\` |"
            echo "| Target tag | \`:${VERSION}\` |"
            echo "| Target digest | \`${DST_DIGEST}\` |"
            echo ""
            if [ "${SRC_DIGEST}" = "${DST_DIGEST}" ]; then
              echo ":white_check_mark: Digests match — manifest-only retag succeeded."
            else
              echo ":x: Digest mismatch — investigate."
              exit 1
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          [ "${SRC_DIGEST}" = "${DST_DIGEST}" ]
