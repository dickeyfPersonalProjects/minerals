name: Promote to prod

# Single, atomic promote-prod step: moves the `prod` git tag AND the
# `:prod` GHCR image tag to the same commit in lockstep. Also stamps a
# versioned tag (`vX.Y.Z`) on both the git ref and the image so an
# immutable reference exists alongside the moving `prod` tag.
#
# Prevents the manifest/image drift class of bug (mi-04b1): GitOps Flux
# `Kustomization` pinned to `ref.tag: prod` + `image: ...:prod` resolves
# to a single, consistent (manifest, image) pair after every promote.
#
# This is the ONLY promotion path. The previous `promote-prod` (image-
# only, from `:staging`) and `release` (image-only, retag `:prod` to a
# version on `v*` tag push) workflows are superseded by this one.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to stamp (e.g. v1.0.2). Must not already exist unless force=true.'
        required: true
        type: string
      source_ref:
        description: 'Commit / ref to promote (default: main HEAD)'
        required: false
        default: ''
        type: string
      force:
        description: 'Allow overwriting an existing version tag at a different commit'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Validate inputs + source image without moving any tag'
        required: false
        default: false
        type: boolean

permissions:
  # Needed to push the version tag and force-move the `prod` tag.
  contents: write
  # Needed to retag GHCR images.
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/dickeyfpersonalprojects/minerals
  # GitOps repo + the prod Flux Kustomization file inside it that this
  # workflow digest-pins after a promote. A moved `:prod` tag does NOT
  # roll a running pod (the pod-spec string is unchanged even though the
  # tag now points at new bytes); pinning the image by immutable DIGEST
  # makes each promote a real spec change, so the pod actually rolls.
  # The operator MUST set these to match their gitops layout — the pin
  # step fails loudly if the file path is wrong.
  FLEET_INFRA_REPO: dickeyfpersonalprojects/fleet-infra
  FLEET_INFRA_PROD_KUSTOMIZATION: clusters/prod/mineral/mineral.yaml

jobs:
  promote:
    name: Promote to prod (atomic)
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "${VERSION}" =~ ^v[0-9]+(\.[0-9]+){0,2}([.-].+)?$ ]]; then
            echo "::error::Version '${VERSION}' does not match v<MAJOR>[.<MINOR>[.<PATCH>]][-suffix]"
            exit 1
          fi

      - name: Pre-flight — fleet-infra token present
        # Validate the cross-repo write credential BEFORE moving any tag.
        # If it is missing, a promote would move the git + image tags but
        # be unable to digest-pin fleet-infra — leaving prod on a stale
        # digest with no signal. Failing here keeps the promote atomic:
        # nothing moves unless the whole flow (including the gitops pin)
        # can complete. Skipped on dry runs (they touch nothing).
        if: ${{ !inputs.dry_run }}
        env:
          FLEET_INFRA_TOKEN: ${{ secrets.FLEET_INFRA_TOKEN }}
        run: |
          if [ -z "${FLEET_INFRA_TOKEN}" ]; then
            echo "::error::FLEET_INFRA_TOKEN secret is missing or empty. The promote would move the git+image tags but could NOT digest-pin ${FLEET_INFRA_REPO}, so the prod pod would not roll. Create a fine-grained PAT or GitHub App token with contents:write scoped to ${FLEET_INFRA_REPO} and store it as the FLEET_INFRA_TOKEN secret. See docs/deploy/README.md#promoting-to-prod."
            exit 1
          fi
          echo "FLEET_INFRA_TOKEN present."

      - name: Resolve source ref
        id: src
        env:
          SOURCE_REF_INPUT: ${{ inputs.source_ref }}
        run: |
          ref="${SOURCE_REF_INPUT:-main}"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout source ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.src.outputs.ref }}
          # Full history + tags so the conflict check sees every existing
          # version tag, and so the push has a known base for refs/tags/prod.
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve commit SHAs
        id: commit
        run: |
          sha=$(git rev-parse HEAD)
          short=$(git rev-parse --short=7 HEAD)
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "short=${short}" >> "$GITHUB_OUTPUT"
          echo "Promoting commit ${sha}"

      - name: Check version-tag conflict
        env:
          VERSION: ${{ inputs.version }}
          FORCE: ${{ inputs.force }}
          NEW_SHA: ${{ steps.commit.outputs.sha }}
        run: |
          # The tag may live on the remote without being a local ref, but
          # fetch-tags above pulled it. `git rev-parse --verify refs/tags/X`
          # succeeds iff X exists locally as a tag.
          if git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null; then
            existing=$(git rev-list -n1 "refs/tags/${VERSION}")
            if [ "${existing}" = "${NEW_SHA}" ]; then
              echo "Tag ${VERSION} already exists at ${NEW_SHA} — idempotent, continuing."
            elif [ "${FORCE}" = "true" ]; then
              echo "::warning::Tag ${VERSION} exists at ${existing}; force-overwriting to ${NEW_SHA}."
            else
              echo "::error::Tag ${VERSION} already exists at ${existing}. Re-run with force=true to overwrite."
              exit 1
            fi
          else
            echo "Tag ${VERSION} does not yet exist — fresh stamp."
          fi

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Verify source image exists
        id: source_image
        env:
          SHORT: ${{ steps.commit.outputs.short }}
        run: |
          src_tag="sha-${SHORT}"
          # The main-branch CI pushes ${IMAGE_NAME}:sha-<short> for every
          # merge (see main.yml). If this lookup fails, the source commit
          # has no published image — promotion would create a `prod` git
          # tag pointing at a commit no image exists for.
          if ! digest=$(docker buildx imagetools inspect \
              "${IMAGE_NAME}:${src_tag}" \
              --format '{{.Manifest.Digest}}' 2>/dev/null); then
            echo "::error::Source image ${IMAGE_NAME}:${src_tag} does not exist. Ensure the merge-to-main CI built and pushed an image for this commit."
            exit 1
          fi
          echo "tag=${src_tag}" >> "$GITHUB_OUTPUT"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Source image: ${IMAGE_NAME}:${src_tag} @ ${digest}"

      - name: Configure git identity
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Stamp tags locally
        if: ${{ !inputs.dry_run }}
        env:
          VERSION: ${{ inputs.version }}
          NEW_SHA: ${{ steps.commit.outputs.sha }}
        run: |
          # `prod` always force-moves; the version tag is either new or
          # already validated by the conflict-check step.
          git tag -f "${VERSION}" "${NEW_SHA}"
          git tag -f prod "${NEW_SHA}"

      - name: Push tags atomically
        if: ${{ !inputs.dry_run }}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          # --atomic: either both refs update on the remote or neither does.
          # --force: required to move the `prod` tag; harmless on a fresh
          #          version tag, and authorized for the version tag when
          #          force=true (already gated by the conflict check).
          git push --atomic --force origin \
            "refs/tags/${VERSION}" \
            "refs/tags/prod"

      - name: Retag image as :prod and :version
        if: ${{ !inputs.dry_run }}
        env:
          VERSION: ${{ inputs.version }}
          SRC_TAG: ${{ steps.source_image.outputs.tag }}
        run: |
          # Manifest-only retag: the multi-arch manifest list at the
          # source tag is published under :prod and :${VERSION} with no
          # rebuild and no architecture-skew risk.
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:prod" \
            -t "${IMAGE_NAME}:${VERSION}" \
            "${IMAGE_NAME}:${SRC_TAG}"

      - name: Verify post-retag digests match source
        if: ${{ !inputs.dry_run }}
        id: verify
        env:
          VERSION: ${{ inputs.version }}
          SRC_DIGEST: ${{ steps.source_image.outputs.digest }}
        run: |
          prod_digest=$(docker buildx imagetools inspect \
            "${IMAGE_NAME}:prod" --format '{{.Manifest.Digest}}')
          ver_digest=$(docker buildx imagetools inspect \
            "${IMAGE_NAME}:${VERSION}" --format '{{.Manifest.Digest}}')
          echo "prod_digest=${prod_digest}" >> "$GITHUB_OUTPUT"
          echo "ver_digest=${ver_digest}" >> "$GITHUB_OUTPUT"
          if [ "${prod_digest}" != "${SRC_DIGEST}" ] || [ "${ver_digest}" != "${SRC_DIGEST}" ]; then
            echo "::error::Digest mismatch after retag (src=${SRC_DIGEST}, prod=${prod_digest}, version=${ver_digest})"
            exit 1
          fi
          echo "All three tags point at ${SRC_DIGEST}."

      - name: Checkout fleet-infra (gitops)
        # Second checkout into a subdir; leaves the minerals checkout
        # (with its tags) intact in the workspace root. The token is the
        # cross-repo write credential validated in the pre-flight step.
        if: ${{ !inputs.dry_run }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FLEET_INFRA_REPO }}
          token: ${{ secrets.FLEET_INFRA_TOKEN }}
          path: fleet-infra
          fetch-depth: 1

      - name: Digest-pin minerals image in fleet-infra prod Kustomization
        if: ${{ !inputs.dry_run }}
        env:
          DIGEST: ${{ steps.source_image.outputs.digest }}
          KFILE: ${{ env.FLEET_INFRA_PROD_KUSTOMIZATION }}
        run: |
          set -euo pipefail
          file="fleet-infra/${KFILE}"
          if [ ! -f "${file}" ]; then
            echo "::error::Prod Kustomization not found at '${KFILE}' in ${FLEET_INFRA_REPO}. Set FLEET_INFRA_PROD_KUSTOMIZATION to its path within the gitops repo."
            exit 1
          fi
          # There must be exactly one images[] override for our image.
          match=$(IMG="${IMAGE_NAME}" yq '[.spec.images[] | select(.name == env(IMG))] | length' "${file}")
          if [ "${match}" != "1" ]; then
            echo "::error::Expected exactly one spec.images[] entry named ${IMAGE_NAME} in ${KFILE}, found ${match}."
            exit 1
          fi
          # Set the `digest:` field and remove `newTag:`. kustomize renders
          # `digest: sha256:...` as `image@sha256:...` (the correct pinned
          # reference); a `newTag:` holding a digest would instead produce a
          # broken `:sha256:...` tag. A digest change IS a pod-spec change,
          # so Flux's next reconcile rolls the deployment.
          IMG="${IMAGE_NAME}" DIG="${DIGEST}" yq -i \
            '(.spec.images[] | select(.name == env(IMG))) |= (.digest = env(DIG) | del(.newTag))' \
            "${file}"
          echo "Pinned ${IMAGE_NAME} to ${DIGEST} in ${KFILE}:"
          yq '.spec.images' "${file}"

      - name: Commit and push fleet-infra digest pin
        if: ${{ !inputs.dry_run }}
        working-directory: fleet-infra
        env:
          DIGEST: ${{ steps.source_image.outputs.digest }}
          VERSION: ${{ inputs.version }}
          KFILE: ${{ env.FLEET_INFRA_PROD_KUSTOMIZATION }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet -- "${KFILE}"; then
            echo "fleet-infra already pinned to ${DIGEST}; nothing to commit."
            exit 0
          fi
          git add "${KFILE}"
          git commit -m "chore(prod): pin minerals to ${DIGEST} (promoted ${VERSION})"
          git push
          echo "Pushed digest pin to ${FLEET_INFRA_REPO}."

      - name: Summary
        env:
          VERSION: ${{ inputs.version }}
          SHA: ${{ steps.commit.outputs.sha }}
          SHORT: ${{ steps.commit.outputs.short }}
          SRC_TAG: ${{ steps.source_image.outputs.tag }}
          SRC_DIGEST: ${{ steps.source_image.outputs.digest }}
          DRY_RUN: ${{ inputs.dry_run }}
          FORCE: ${{ inputs.force }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          {
            echo "## Promote to prod"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Version | \`${VERSION}\` |"
            echo "| Commit | [\`${SHORT}\`](${REPO_URL}/commit/${SHA}) |"
            echo "| Source image | \`${IMAGE_NAME}:${SRC_TAG}\` |"
            echo "| Source digest | \`${SRC_DIGEST}\` |"
            echo "| Force | \`${FORCE}\` |"
            echo "| Dry run | \`${DRY_RUN}\` |"
            echo ""
            if [ "${DRY_RUN}" = "true" ]; then
              echo ":information_source: Dry run — no git tags or image tags were moved."
            else
              echo ":white_check_mark: Promoted commit \`${SHORT}\` to prod."
              echo ""
              echo "- Git: \`refs/tags/${VERSION}\` and \`refs/tags/prod\` both at \`${SHA}\`."
              echo "- Image: \`${IMAGE_NAME}:${VERSION}\` and \`${IMAGE_NAME}:prod\` both at \`${SRC_DIGEST}\`."
              echo "- GitOps: digest-pinned \`${FLEET_INFRA_REPO}\` \`${FLEET_INFRA_PROD_KUSTOMIZATION}\` to \`${SRC_DIGEST}\`."
              echo ""
              echo "### Two pins, both maintained automatically"
              echo ""
              echo "- **Manifests** follow the \`prod\` git tag via Flux \`spec.ref.tag: prod\` (moved above)."
              echo "- **Image** is pinned by immutable digest in the prod Flux \`Kustomization\` (\`spec.images[0].digest\`, just written to fleet-infra)."
              echo ""
              echo "The digest write is what makes the pod roll: a moved \`:prod\` tag is an unchanged pod-spec string, but a new \`@sha256:...\` digest is a spec change. No manual gitops edit is needed — this workflow committed it."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
