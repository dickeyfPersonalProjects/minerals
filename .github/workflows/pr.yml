name: PR validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: minerals
          POSTGRES_PASSWORD: minerals
          POSTGRES_DB: minerals
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U minerals"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://minerals:minerals@localhost:5432/minerals?sslmode=disable
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin

    steps:
      - uses: actions/checkout@v6

      # MinIO is started via `docker run` rather than a GHA service container
      # because the official `minio/minio` image requires `server /data` as its
      # CMD, and GHA service container syntax has no field for CMD/args
      # (`options:` only forwards `docker create` flags like --entrypoint, which
      # cannot supply trailing args). The previously-used `bitnami/minio:latest`
      # tag was removed when Bitnami pulled their public free-tier images.
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            --health-cmd 'curl -fsS http://localhost:9000/minio/health/live || exit 1' \
            --health-interval=5s --health-timeout=3s --health-retries=10 \
            minio/minio:RELEASE.2025-09-07T16-13-09Z \
            server /data

      - name: Wait for MinIO ready
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null; then
              echo "MinIO ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "MinIO did not become ready in 30s" >&2
          docker logs minio >&2 || true
          exit 1

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt check
        run: make SHELL=/bin/bash fmt-check

      - name: go vet
        run: make vet

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

      # Mechanical enforcement of CONTRACT §16 license allowlist (mi-q7n).
      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: License check
        run: make license-check

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Unit tests
        # Combines race detection, shuffled execution, and JUnit output
        # in one invocation per mi-qb3. -race needs CGO_ENABLED=1 (the
        # actions/setup-go@v6 default).
        run: gotestsum --junitfile junit.xml -- -race -shuffle=on ./...

      # SCA: known CVEs in direct + transitive Go deps, scoped to
      # reachable callgraph (per mi-xql / Q-1 R3).
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck
        run: make vulncheck

      - name: Upload junit.xml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-junit
          path: junit.xml
          if-no-files-found: ignore

      - name: Detect migrations
        id: migrations
        run: |
          if compgen -G 'migrations/*.up.sql' > /dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::migrations/ is empty — skipping integration tests"
          fi

      - name: Integration tests
        if: steps.migrations.outputs.present == 'true'
        run: make test-integration

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Detect frontend
        id: detect
        run: |
          if [ -f frontend/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::frontend/ not present — skipping frontend gates"
          fi

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.present == 'true'
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm ci

      - name: prettier check
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npx prettier --check .

      - name: eslint
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npx eslint .

      - name: svelte-check (typecheck)
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm run check

      - name: tests (with coverage + GHA annotations)
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npx vitest run --reporter=github-actions --reporter=default --coverage

      - name: Upload frontend coverage
        if: steps.detect.outputs.present == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: ignore

  # Validates the committed docker-compose.yml end-to-end. The Backend
  # job above brings up Postgres + MinIO via GHA service containers
  # (and a `docker run` for MinIO), bypassing the compose file — so a
  # polecat could break compose (versions, ports, credentials, missing
  # services) without CI noticing. This job exercises the file the way
  # a fresh contributor would after `git clone`.
  #
  # Health-check pattern: bounded poll loops on the host (pg_isready
  # for Postgres, curl for MinIO) rather than relying on the compose
  # file's own healthchecks. Polling from the host catches host-port-
  # binding drift that an in-container healthcheck would miss.
  compose-smoke:
    name: Compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: docker compose up
        # Per mi-8ky, the default-mode contract is: this single command
        # brings up postgres + minio + migrate + app, with the app
        # reachable on :8080. The image build for `app` adds ~1-2 min
        # on a cold runner; the bumped timeout-minutes accommodates it.
        run: docker compose up -d

      - name: Wait for Postgres healthy
        run: |
          for i in $(seq 1 60); do
            if pg_isready -h localhost -p 5432 -U minerals -d minerals >/dev/null 2>&1; then
              echo "Postgres ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Postgres did not become ready in 60s" >&2
          docker compose logs postgres >&2 || true
          exit 1

      - name: Wait for MinIO healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null; then
              echo "MinIO ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "MinIO did not become ready in 60s" >&2
          docker compose logs minio >&2 || true
          exit 1

      - name: Postgres smoke (SELECT 1)
        env:
          PGPASSWORD: minerals
        run: psql -h localhost -p 5432 -U minerals -d minerals -c 'SELECT 1;'

      - name: MinIO smoke (health/live)
        run: curl -fsS http://localhost:9000/minio/health/live

      - name: Wait for app /healthz
        # mi-8ky acceptance: default-mode `docker compose up -d` brings
        # the app up too. App auto-applies migrations on dev startup;
        # allow up to 120s for the cold-start chain.
        run: |
          for i in $(seq 1 120); do
            body=$(curl -fsS http://localhost:8080/healthz 2>/dev/null || true)
            if [ "$body" = "ok" ]; then
              echo "App ready after ${i}s (body: ${body})"
              exit 0
            fi
            sleep 1
          done
          echo "App did not respond ok on /healthz in 120s" >&2
          docker compose ps >&2 || true
          docker compose logs app >&2 || true
          exit 1

      - name: docker compose down
        if: always()
        run: docker compose down -v

  # End-to-end Keycloak smoke covering BOTH halves of the auth path
  # in one job (mi-ivk + mi-dwx + mi-9eq + mi-6oa):
  #
  #   1. Backend JWT acceptance — curl + password grant against a
  #      test-only client (mi-ivk). Proves the backend accepts a real
  #      Keycloak-issued JWT. BACKEND-ONLY: this path does not exercise
  #      the SPA, the router, the CSP, or PKCE. Keep it because it
  #      isolates a real failure mode (JWKS / aud / iss) without the
  #      browser flow's flakiness budget — but it is NOT primary auth
  #      coverage. See mi-6oa for the keep-and-scope decision.
  #   2. Real-browser PKCE round-trip — Playwright drives a headless
  #      Chromium through Login → Keycloak form → /auth/callback →
  #      token exchange → logout (mi-dwx). PRIMARY user-facing-flow
  #      coverage. Catches SPA routing (mi-0ag), CSP (mi-cl1), and
  #      everything else only a real browser exercises.
  #
  # Folded into one job so both halves share the compose stack
  # (keycloak cold start + terraform apply happen once).
  #
  # Placement decision: a standalone job that runs on EVERY PR — not
  # folded into compose-smoke, not gated to auth paths. Rationale: it
  # runs in parallel with backend / frontend / compose-smoke, so its
  # ~3-4 min wall-clock never lands on the critical path. A `paths:`
  # filter would save runner-minutes but trade away the always-green
  # guarantee — for an auth path that's the wrong trade. Revisit if
  # PR CI wall-clock regresses.
  #
  # No compose override needed (mi-9eq). An earlier
  # `.github/keycloak-ci.compose.yml` set `KC_HOSTNAME=http://keycloak:8080`
  # so the app *container* could reach Keycloak for OIDC discovery —
  # but that broke the browser PKCE flow because Keycloak then
  # rendered login form actions pointing at the in-network hostname
  # `keycloak:8080` that the browser cannot resolve. The override is
  # also unnecessary now: docker-compose.yml sets
  # `OIDC_JWKS_URL=http://keycloak:8080/.../certs`, which makes
  # internal/oidc/verifier.go skip OIDC discovery entirely (string-
  # only `iss` match against `OIDC_ISSUER_URL=http://localhost:8081/...`).
  # Keeping the single compose hostname `http://localhost:8081` makes
  # both browser and backend paths work simultaneously.
  keycloak-smoke:
    name: Keycloak auth smoke
    runs-on: ubuntu-latest
    # Bumped from 12 → 18 min when the Playwright PKCE round-trip
    # (mi-dwx) was added: + Chromium download on cache miss, + ~30 s
    # for the spec itself (login + token exchange + logout). The
    # spec's own per-test cap is 90 s.
    timeout-minutes: 18
    # Disable the API rate limiter for the whole smoke (mi-y3wp). The
    # auth tier is deliberately strict in prod (10 req/min/IP, mi-tnru),
    # but this job's Playwright spec drives multiple login round-trips
    # (seeded fixture user + default-shaped user + logout) in quick
    # succession from a single IP — strict limits throttle that
    # legitimate test traffic and the login page.waitForURL times out.
    # docker-compose.yml interpolates this into the app container's
    # RATE_LIMIT_ENABLED, so it applies to both the initial `up` and the
    # `--force-recreate`. The limiter's real-limit behaviour is covered
    # by internal/ratelimit + internal/api unit tests; the end-to-end
    # smoke runs with limits off so it isn't throttled.
    env:
      RATE_LIMIT_ENABLED: "false"
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"
          # dev-seed.sh consumes `terraform output -raw ...`; the
          # action's stdout-wrapper corrupts that capture.
          terraform_wrapper: false

      - name: docker compose up (with keycloak)
        run: docker compose --profile keycloak up -d

      - name: Wait for Keycloak ready
        run: |
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:8081/realms/master >/dev/null 2>&1; then
              echo "Keycloak ready after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "Keycloak did not become ready in 180s" >&2
          docker compose --profile keycloak logs keycloak >&2 || true
          exit 1

      - name: Seed Keycloak realm + test users
        working-directory: terraform/keycloak
        env:
          # Creates the `minerals-test` public direct-access-grant
          # client (see terraform/keycloak/clients.tf) so the
          # backend-JWT-acceptance step below can mint a realm token
          # via the password grant. Backend-only scope — the BFF smoke
          # uses `minerals-frontend` (CONFIDENTIAL) like real users do.
          # Never set in staging/prod.
          TF_VAR_test_environment: "true"
        run: bash dev-seed.sh

      - name: Recreate app container with BFF secrets (mi-sap2)
        # dev-seed.sh wrote .env.bff carrying OIDC_CLIENT_SECRET (from
        # the now-CONFIDENTIAL minerals-frontend client, mi-qnmy) and a
        # fresh OAUTH_STATE_HMAC_KEY. The app booted before dev-seed
        # ran, so it currently has empty BFF env vars and /auth/login
        # 404s. --force-recreate restarts it with the new env.
        run: |
          if [ ! -f .env.bff ]; then
            echo "dev-seed.sh did not produce .env.bff — BFF auth cannot be enabled" >&2
            exit 1
          fi
          docker compose --env-file .env.bff --profile keycloak up -d --force-recreate app

      - name: Wait for app /healthz
        # App auto-applies migrations on dev startup; allow up to 120s
        # for the cold-start chain (image build + migrate).
        run: |
          for i in $(seq 1 120); do
            body=$(curl -fsS http://localhost:8080/healthz 2>/dev/null || true)
            if [ "$body" = "ok" ]; then
              echo "App ready after ${i}s (body: ${body})"
              exit 0
            fi
            sleep 1
          done
          echo "App did not respond ok on /healthz in 120s" >&2
          docker compose --profile keycloak ps >&2 || true
          docker compose --profile keycloak logs app >&2 || true
          exit 1

      - name: Backend rejects requests without a bearer token (401)
        # POST /api/v1/profile is a protected endpoint. Without a
        # bearer token the auth middleware MUST reject it before the
        # handler runs.
        run: |
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -X POST http://localhost:8080/api/v1/profile)
          if [ "$code" != "401" ]; then
            echo "expected 401 for no-token request, got $code" >&2
            exit 1
          fi
          echo "no-token request rejected with 401"

      - name: Backend accepts a real Keycloak-issued JWT (200)
        # BACKEND-ONLY assertion (mi-6oa). Mint a token for a seeded
        # test user via the password grant against the dev realm, then
        # call the same protected endpoint with it. A 200 proves the
        # app discovered the realm JWKS, verified the signature, and
        # accepted the `iss` + `aud` claims — the full real-Keycloak
        # backend path.
        #
        # This step intentionally does NOT exercise the SPA, router,
        # CSP, or PKCE redirect; user-facing-flow coverage is the
        # Playwright PKCE round-trip below (mi-dwx). The password grant
        # lives on for one reason only: it isolates JWT-verification
        # regressions cheaply, without the browser-flow's flakiness
        # budget. Do NOT add user-facing-flow assertions here — they
        # belong in the Playwright spec.
        run: |
          set -euo pipefail
          token=$(curl -fsS -X POST \
            http://localhost:8081/realms/minerals/protocol/openid-connect/token \
            -d grant_type=password \
            -d client_id=minerals-test \
            -d username=user1@localhost \
            -d password='MineralsDev123!' \
            -d scope=openid \
            | jq -r '.access_token')
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "failed to obtain a token from Keycloak" >&2
            exit 1
          fi

          # Valid token → profile setup completes → 200.
          code=$(curl -sS -o /tmp/profile.json -w '%{http_code}' \
            -X POST http://localhost:8080/api/v1/profile \
            -H "Authorization: Bearer ${token}" \
            -H 'Content-Type: application/json' \
            -d '{"display_name":"CI Smoke User"}')
          if [ "$code" != "200" ]; then
            echo "expected 200 for valid-token request, got $code" >&2
            cat /tmp/profile.json >&2 || true
            docker compose --profile keycloak logs app >&2 || true
            exit 1
          fi
          echo "valid Keycloak token accepted with 200: $(cat /tmp/profile.json)"

          # And a syntactically broken token is still rejected — proves
          # the 200 above came from real verification, not a bypass.
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            http://localhost:8080/api/v1/collectors \
            -H 'Authorization: Bearer not.a.valid.jwt')
          if [ "$code" != "401" ]; then
            echo "expected 401 for malformed-token request, got $code" >&2
            exit 1
          fi
          echo "malformed token rejected with 401"

      # --- Default-shaped Keycloak user smoke (mi-2xa4) ---------------
      #
      # The steps above use the fixture-shaped `user1@localhost` —
      # seeded by terraform/keycloak/dev-seed.sh on every CI run, with
      # whatever roles/attributes/audience the realm config grants. That
      # path covers "realm with full V2 config applied" and is kept on
      # purpose (devops-* roles, custom attributes, anything fixtures
      # provision).
      #
      # The block below covers the complementary failure mode that has
      # shipped two P0/P1 auth bugs already (mi-cl1 audience-mapper,
      # mi-2eg6 missing 'user' role): a user that came out of Keycloak
      # with default realm config — no role assignments, no group
      # memberships, no attribute pre-fill — must be able to log in,
      # complete profile setup, and write through the protected API
      # against the SAME backend the fixture user uses. Reverting either
      # fix locally MUST cause one of these steps to fail.
      #
      # The smoke is intentionally provisioned via the Admin API in this
      # job (not via dev-seed.sh) so the staging-vs-dev configuration
      # drift the original bugs lived in cannot hide here either.
      - name: Default-shaped user — provision via Keycloak Admin API (mi-2xa4)
        env:
          DEFAULT_USERNAME: smoke-default@localhost
          DEFAULT_PASSWORD: MineralsDev123!
        run: |
          set -euo pipefail
          admin_token=$(curl -fsS -X POST \
            http://localhost:8081/realms/master/protocol/openid-connect/token \
            -d grant_type=password \
            -d client_id=admin-cli \
            -d username=admin \
            -d password=admin \
            | jq -r '.access_token')
          if [ -z "$admin_token" ] || [ "$admin_token" = "null" ]; then
            echo "failed to obtain Keycloak master-realm admin token" >&2
            exit 1
          fi

          # Bare-minimum body: only the fields Keycloak's user profile
          # marks as required (username/email, firstName/lastName — same
          # reason dev-seed.sh sets them, otherwise the password grant
          # fails with invalid_grant) and the password. No roles, no
          # groups, no attributes.
          body=$(jq -n \
            --arg u "$DEFAULT_USERNAME" \
            --arg p "$DEFAULT_PASSWORD" \
            '{
               username: $u,
               email: $u,
               enabled: true,
               emailVerified: true,
               firstName: "Default",
               lastName:  "Shape",
               credentials: [{type: "password", value: $p, temporary: false}]
             }')
          code=$(curl -sS -o /tmp/admin-create.out -w '%{http_code}' \
            -H "Authorization: Bearer ${admin_token}" \
            -H 'Content-Type: application/json' \
            -X POST http://localhost:8081/admin/realms/minerals/users \
            -d "$body")
          # 201 = created, 409 = already exists (re-run of the job on a
          # warm volume); both are acceptable starting points.
          if [ "$code" != "201" ] && [ "$code" != "409" ]; then
            echo "Admin-API user creation failed: HTTP $code" >&2
            cat /tmp/admin-create.out >&2 || true
            exit 1
          fi
          echo "default-shaped user provisioned: $DEFAULT_USERNAME (HTTP $code)"

      - name: Default-shaped user — token claims match snapshot (mi-2xa4)
        # Mint a token via the same minerals-test password-grant client
        # the fixture smoke uses, decode the payload, log roles + aud
        # (so future drift is visible at a glance in CI output), and
        # diff `realm_access.roles` against the committed snapshot.
        # The snapshot lives at internal/oidc/testdata/keycloak-default-token-claims.json
        # and is documented in docs/design/08-keycloak-default-token-shape.md.
        env:
          # Same literals as the provision step. The fixture-user smoke
          # also uses literals (not step outputs); keep the two
          # consistent so the only source of drift between this and
          # the working fixture path is the user shape.
          DEFAULT_USERNAME: smoke-default@localhost
          DEFAULT_PASSWORD: MineralsDev123!
        # NB: NO `set -euo pipefail`. PR #205's first run AND PR #215's
        # first run both died inside this step with 113ms of total
        # runtime and ZERO stderr — `##[group]Run` then
        # `##[error]Process completed with exit code 1` with nothing
        # between, even when written with body+code capture and explicit
        # FAIL echos under set -e. Whatever is happening (GHA secret-
        # masker swallowing output, an aborted command substitution,
        # a parse-time surprise) is hidden by errexit's silent-exit
        # semantics. Trade `set -e`'s convenience for legibility:
        # mirror every line to /tmp/default-token-step.log and let the
        # next step (Dump default-token-step log) cat the file with
        # if: always() — so the diagnostic survives even if GHA hides
        # this step's own stdout.
        run: |
          set +e
          log=/tmp/default-token-step.log
          : > "$log"
          {
            echo "--- step start: $(date -u +%FT%TZ) ---"
            code=$(curl -sS -o /tmp/default-token-resp.json -w '%{http_code}' \
              -X POST http://localhost:8081/realms/minerals/protocol/openid-connect/token \
              -d grant_type=password \
              -d client_id=minerals-test \
              --data-urlencode "username=${DEFAULT_USERNAME}" \
              --data-urlencode "password=${DEFAULT_PASSWORD}" \
              -d scope=openid)
            curl_rc=$?
            echo "token-grant: curl_rc=$curl_rc HTTP=$code"
            if [ "$code" != "200" ]; then
              echo "FAIL: default-shaped user password grant returned HTTP $code"
              echo "request: username=${DEFAULT_USERNAME} client_id=minerals-test"
              echo "response body:"
              cat /tmp/default-token-resp.json 2>&1 || echo "(no body file)"
              echo ""
              echo "Keycloak user record for this email:"
              admin_token=$(curl -sS -X POST \
                http://localhost:8081/realms/master/protocol/openid-connect/token \
                -d grant_type=password -d client_id=admin-cli \
                -d username=admin -d password=admin \
                | jq -r '.access_token' 2>&1)
              if [ -n "$admin_token" ] && [ "$admin_token" != "null" ]; then
                curl -sS -H "Authorization: Bearer ${admin_token}" \
                  "http://localhost:8081/admin/realms/minerals/users?username=${DEFAULT_USERNAME}&exact=true" \
                  | jq '.' 2>&1 || echo "(admin lookup failed)"
              else
                echo "(could not obtain master-realm admin token for diagnostics)"
              fi
              echo "--- step end (token-grant failed) ---"
              exit 1
            fi
            token=$(jq -r '.access_token' /tmp/default-token-resp.json 2>&1)
            if [ -z "$token" ] || [ "$token" = "null" ]; then
              echo "FAIL: default-shaped user token response had no access_token"
              cat /tmp/default-token-resp.json 2>&1 || echo "(no body file)"
              echo "--- step end (token parse failed) ---"
              exit 1
            fi

            # Persist the token for the steps below — only readable by
            # this job's runner.
            printf '%s' "$token" > /tmp/default-token.txt

            # Decode the JWT payload (base64url, no signature check —
            # already verified above by trusting Keycloak's reply on
            # localhost). `tr` rewrites the URL-safe alphabet and pads
            # the body before `base64 -d`.
            payload_b64=$(printf '%s' "$token" | cut -d. -f2 | tr '_-' '/+')
            # Pad to a multiple of 4 (some base64 decoders are strict).
            pad=$(( (4 - ${#payload_b64} % 4) % 4 ))
            payload=$(printf '%s%s' "$payload_b64" "$(printf '%0.s=' $(seq 1 $pad))" \
              | base64 -d 2>/dev/null)
            echo "default-shaped token claims (realm_access + aud + azp):"
            echo "$payload" | jq '{realm_access, aud, azp}'

            actual=$(echo "$payload" | jq -c '.realm_access.roles | sort | unique')
            expected=$(jq -c '.realm_access.roles | sort | unique' \
              internal/oidc/testdata/keycloak-default-token-claims.json)
            if [ "$actual" != "$expected" ]; then
              echo "FAIL: default Keycloak realm_access.roles drifted from snapshot"
              echo "  expected: $expected"
              echo "  actual:   $actual"
              echo "If this drift is intentional (Keycloak version bump,"
              echo "realm-config change, etc.) update the snapshot at"
              echo "internal/oidc/testdata/keycloak-default-token-claims.json"
              echo "in the SAME PR — see docs/design/08-keycloak-default-token-shape.md."
              echo "--- step end (snapshot diff) ---"
              exit 1
            fi
            echo "default-shaped realm_access.roles matches snapshot: $actual"

            # Audience must contain minerals-frontend — the backend
            # rejects on `aud`, not `azp` (mi-cl1 family). The
            # minerals-test client carries the same audience mapper as
            # the SPA client; if a future TF change drops it, this
            # assertion catches it before staging does.
            if ! echo "$payload" | jq -e '
                (.aud | if type=="array" then index("minerals-frontend") else . == "minerals-frontend" end)
              ' >/dev/null; then
              echo "FAIL: default-shaped token aud claim missing 'minerals-frontend'"
              echo "$payload" | jq '.aud'
              echo "--- step end (aud missing) ---"
              exit 1
            fi
            echo "--- step end (success) ---"
          } 2>&1 | tee -a "$log"
          exit_code=${PIPESTATUS[0]}
          echo "[wrapper] braced-block exit_code=$exit_code"
          exit "$exit_code"

      - name: Default-shaped user — dump token-step log on failure (mi-2xa4)
        if: always()
        run: |
          # Even if the previous step's stdout/stderr is hidden by the
          # GHA secret-masker, we wrote everything to /tmp/default-token-step.log
          # via tee. Cat it here so the failure is legible.
          if [ -f /tmp/default-token-step.log ]; then
            echo "=== /tmp/default-token-step.log ($(wc -c </tmp/default-token-step.log) bytes) ==="
            cat /tmp/default-token-step.log
            echo "=== end of log ==="
          else
            echo "/tmp/default-token-step.log does NOT exist — the previous step never reached the braced-block redirect (likely a pre-script GHA failure)."
          fi
          if [ -f /tmp/default-token-resp.json ]; then
            echo "=== /tmp/default-token-resp.json ==="
            cat /tmp/default-token-resp.json
            echo "=== end of token response body ==="
          fi

      - name: Default-shaped user — profile setup + write succeeds (mi-2xa4)
        # The core mi-2eg6 regression net: a user whose JWT does NOT
        # carry the `user` realm role MUST still be able to write
        # through the protected API. authzUser injects `user`
        # implicitly for every authenticated caller; if that fallback
        # is removed or narrowed, POST /api/v1/specimens below 403s.
        run: |
          set -euo pipefail
          token=$(cat /tmp/default-token.txt)

          # 1. Lift the first-login profile gate. The endpoint runs
          #    without authzGuard but proves the resolve-user middleware
          #    accepts a default-shaped JWT (it must derive a stable
          #    user id from `sub` without help from custom claims).
          code=$(curl -sS -o /tmp/default-profile.json -w '%{http_code}' \
            -X POST http://localhost:8080/api/v1/profile \
            -H "Authorization: Bearer ${token}" \
            -H 'Content-Type: application/json' \
            -d '{"display_name":"Default-Shaped Smoke"}')
          if [ "$code" != "200" ]; then
            echo "FAIL: default-shaped user could not complete profile setup (HTTP $code)" >&2
            cat /tmp/default-profile.json >&2 || true
            docker compose --profile keycloak logs app >&2 || true
            exit 1
          fi
          echo "default-shaped profile setup: $(cat /tmp/default-profile.json)"

          # 2. The actual mi-2eg6 regression catch: a write that
          #    requires the `user` role via Casbin. POST /api/v1/specimens
          #    goes through authzGuard.check with actCreate — a default
          #    Keycloak user without the implicit `user` role would 403.
          create_body='{
            "type": "mineral",
            "name": "Default-shape smoke specimen",
            "visibility": "private"
          }'
          code=$(curl -sS -o /tmp/default-specimen.json -w '%{http_code}' \
            -X POST http://localhost:8080/api/v1/specimens \
            -H "Authorization: Bearer ${token}" \
            -H 'Content-Type: application/json' \
            -d "$create_body")
          if [ "$code" != "201" ]; then
            echo "FAIL: default-shaped user could not create a specimen (HTTP $code)" >&2
            echo "This is the mi-2eg6 regression mode — see authzUser in internal/api/authz.go" >&2
            cat /tmp/default-specimen.json >&2 || true
            docker compose --profile keycloak logs app >&2 || true
            exit 1
          fi
          specimen_id=$(jq -r '.id' /tmp/default-specimen.json)
          echo "default-shaped user created specimen $specimen_id"

          # 3. And the same caller can read its own write back through
          #    the list endpoint — closes the round-trip the bead spec'd.
          code=$(curl -sS -o /tmp/default-list.json -w '%{http_code}' \
            -X GET http://localhost:8080/api/v1/specimens \
            -H "Authorization: Bearer ${token}")
          if [ "$code" != "200" ]; then
            echo "FAIL: default-shaped user could not list specimens (HTTP $code)" >&2
            cat /tmp/default-list.json >&2 || true
            exit 1
          fi
          if ! jq -e --arg id "$specimen_id" '.items[]?.id | select(. == $id)' \
              /tmp/default-list.json >/dev/null; then
            echo "FAIL: default-shaped user's specimen $specimen_id not visible in list" >&2
            cat /tmp/default-list.json >&2 || true
            exit 1
          fi
          echo "default-shaped user can list own specimen — round-trip OK"

      # Real-browser PKCE round-trip (mi-dwx). The curl assertions
      # above cover backend JWT verification; this step covers the
      # live SPA → Keycloak → token-exchange → logout path that
      # backend-only checks can only approximate. Sequential P0 bugs
      # (mi-rvn, mi-0ag, mi-cl1) all shipped past the curl-based smoke
      # because each lives in a layer only a real browser exercises.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci (frontend)
        working-directory: frontend
        run: npm ci

      # Cache Playwright's browser binaries (~200 MB for Chromium +
      # ffmpeg) keyed on the resolved Playwright version. Re-download
      # is automatic on cache miss; never silently use a stale binary.
      - name: Resolve Playwright version
        id: pw
        working-directory: frontend
        run: |
          version=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        working-directory: frontend
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: Playwright auth round-trip (seeded fixture user)
        working-directory: frontend
        env:
          CI: 'true'
          E2E_BASE_URL: 'http://localhost:8080'
        run: npm run e2e

      # Same Playwright spec, default-shaped user (mi-2xa4). Covers the
      # browser layer where mi-cl1 lived — CSP and the SPA's
      # cross-origin token POST cannot be exercised by curl. The
      # spec body is identical; the only difference is the credentials
      # belong to a user provisioned via the Admin API earlier in this
      # job with NO fixture role/group/attribute customisation. If a
      # future regression assumes a fixture-only property in the
      # browser flow (id token shape, account-management redirect,
      # etc.), this run fails while the seeded run above still passes.
      - name: Playwright auth round-trip (default-shaped user)
        working-directory: frontend
        env:
          CI: 'true'
          E2E_BASE_URL: 'http://localhost:8080'
          E2E_USERNAME: smoke-default@localhost
          E2E_PASSWORD: MineralsDev123!
        run: npm run e2e

      # Upload the Playwright HTML report + traces / videos /
      # screenshots when the spec fails. The bead's acceptance test:
      # a failure must give enough context to triage without a local
      # repro. The report includes the full timeline + DOM snapshots.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
          retention-days: 7

      - name: docker compose down
        if: always()
        run: docker compose --profile keycloak down -v
