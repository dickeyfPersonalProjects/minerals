name: PR validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: minerals
          POSTGRES_PASSWORD: minerals
          POSTGRES_DB: minerals
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U minerals"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://minerals:minerals@localhost:5432/minerals?sslmode=disable
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin

    steps:
      - uses: actions/checkout@v4

      # MinIO is started via `docker run` rather than a GHA service container
      # because the official `minio/minio` image requires `server /data` as its
      # CMD, and GHA service container syntax has no field for CMD/args
      # (`options:` only forwards `docker create` flags like --entrypoint, which
      # cannot supply trailing args). The previously-used `bitnami/minio:latest`
      # tag was removed when Bitnami pulled their public free-tier images.
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            --health-cmd 'curl -fsS http://localhost:9000/minio/health/live || exit 1' \
            --health-interval=5s --health-timeout=3s --health-retries=10 \
            minio/minio:RELEASE.2025-09-07T16-13-09Z \
            server /data

      - name: Wait for MinIO ready
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null; then
              echo "MinIO ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "MinIO did not become ready in 30s" >&2
          docker logs minio >&2 || true
          exit 1

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt check
        run: make SHELL=/bin/bash fmt-check

      - name: go vet
        run: make vet

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

      # Mechanical enforcement of CONTRACT §16 license allowlist (mi-q7n).
      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: License check
        run: make license-check

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Unit tests
        # Combines race detection, shuffled execution, and JUnit output
        # in one invocation per mi-qb3. -race needs CGO_ENABLED=1 (the
        # actions/setup-go@v5 default).
        run: gotestsum --junitfile junit.xml -- -race -shuffle=on ./...

      # SCA: known CVEs in direct + transitive Go deps, scoped to
      # reachable callgraph (per mi-xql / Q-1 R3).
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck
        run: make vulncheck

      - name: Upload junit.xml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-junit
          path: junit.xml
          if-no-files-found: ignore

      - name: Detect migrations
        id: migrations
        run: |
          if compgen -G 'migrations/*.up.sql' > /dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::migrations/ is empty — skipping integration tests"
          fi

      - name: Integration tests
        if: steps.migrations.outputs.present == 'true'
        run: make test-integration

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect frontend
        id: detect
        run: |
          if [ -f frontend/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::frontend/ not present — skipping frontend gates"
          fi

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.present == 'true'
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm ci

      - name: prettier check
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npx prettier --check .

      - name: eslint
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npx eslint .

      - name: svelte-check (typecheck)
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm run check

      - name: tests (with coverage + GHA annotations)
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npx vitest run --reporter=github-actions --reporter=default --coverage

      - name: Upload frontend coverage
        if: steps.detect.outputs.present == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: ignore

  # Validates the committed docker-compose.yml end-to-end. The Backend
  # job above brings up Postgres + MinIO via GHA service containers
  # (and a `docker run` for MinIO), bypassing the compose file — so a
  # polecat could break compose (versions, ports, credentials, missing
  # services) without CI noticing. This job exercises the file the way
  # a fresh contributor would after `git clone`.
  #
  # Health-check pattern: bounded poll loops on the host (pg_isready
  # for Postgres, curl for MinIO) rather than relying on the compose
  # file's own healthchecks. Polling from the host catches host-port-
  # binding drift that an in-container healthcheck would miss.
  compose-smoke:
    name: Compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: docker compose up
        # Per mi-8ky, the default-mode contract is: this single command
        # brings up postgres + minio + migrate + app, with the app
        # reachable on :8080. The image build for `app` adds ~1-2 min
        # on a cold runner; the bumped timeout-minutes accommodates it.
        run: docker compose up -d

      - name: Wait for Postgres healthy
        run: |
          for i in $(seq 1 60); do
            if pg_isready -h localhost -p 5432 -U minerals -d minerals >/dev/null 2>&1; then
              echo "Postgres ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Postgres did not become ready in 60s" >&2
          docker compose logs postgres >&2 || true
          exit 1

      - name: Wait for MinIO healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null; then
              echo "MinIO ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "MinIO did not become ready in 60s" >&2
          docker compose logs minio >&2 || true
          exit 1

      - name: Postgres smoke (SELECT 1)
        env:
          PGPASSWORD: minerals
        run: psql -h localhost -p 5432 -U minerals -d minerals -c 'SELECT 1;'

      - name: MinIO smoke (health/live)
        run: curl -fsS http://localhost:9000/minio/health/live

      - name: Wait for app /healthz
        # mi-8ky acceptance: default-mode `docker compose up -d` brings
        # the app up too. App auto-applies migrations on dev startup;
        # allow up to 120s for the cold-start chain.
        run: |
          for i in $(seq 1 120); do
            body=$(curl -fsS http://localhost:8080/healthz 2>/dev/null || true)
            if [ "$body" = "ok" ]; then
              echo "App ready after ${i}s (body: ${body})"
              exit 0
            fi
            sleep 1
          done
          echo "App did not respond ok on /healthz in 120s" >&2
          docker compose ps >&2 || true
          docker compose logs app >&2 || true
          exit 1

      - name: docker compose down
        if: always()
        run: docker compose down -v

  # End-to-end auth smoke test against a real Keycloak (mi-ivk). The
  # Backend job covers JWT verification with a mock JWKS — fast and
  # deterministic. This job covers the other half: prove the app
  # accepts a token minted by a real Keycloak, brought up the way a
  # contributor would (`--profile keycloak` + terraform/keycloak/).
  #
  # Placement decision (bead asked for one): a standalone job that
  # runs on EVERY PR — not folded into compose-smoke, not gated to
  # auth paths. Rationale: it runs in parallel with backend /
  # frontend / compose-smoke, so its ~1-2 min (keycloak cold start +
  # terraform apply, on top of the app image build) never lands on
  # the critical path. A `paths:` filter would save runner-minutes
  # but trade away the always-green guarantee — for an auth path
  # that's the wrong trade. Revisit if PR CI wall-clock regresses.
  #
  # Why the compose override (.github/keycloak-ci.compose.yml): the
  # app *container* must reach Keycloak on the same URL the token
  # `iss` carries. See that file's header for the full explanation.
  keycloak-smoke:
    name: Keycloak auth smoke
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      COMPOSE_FILES: -f docker-compose.yml -f .github/keycloak-ci.compose.yml
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"
          # dev-seed.sh consumes `terraform output -raw ...`; the
          # action's stdout-wrapper corrupts that capture.
          terraform_wrapper: false

      - name: docker compose up (with keycloak)
        run: docker compose --profile keycloak $COMPOSE_FILES up -d

      - name: Wait for Keycloak ready
        run: |
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:8081/realms/master >/dev/null 2>&1; then
              echo "Keycloak ready after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "Keycloak did not become ready in 180s" >&2
          docker compose --profile keycloak $COMPOSE_FILES logs keycloak >&2 || true
          exit 1

      - name: Seed Keycloak realm + test users
        working-directory: terraform/keycloak
        env:
          # Creates the `minerals-test` public direct-access-grant
          # client so the smoke test below can mint a realm token via
          # the password grant.
          TF_VAR_test_environment: "true"
        run: bash dev-seed.sh

      - name: Wait for app /healthz
        # App auto-applies migrations on dev startup; allow up to 120s
        # for the cold-start chain (image build + migrate).
        run: |
          for i in $(seq 1 120); do
            body=$(curl -fsS http://localhost:8080/healthz 2>/dev/null || true)
            if [ "$body" = "ok" ]; then
              echo "App ready after ${i}s (body: ${body})"
              exit 0
            fi
            sleep 1
          done
          echo "App did not respond ok on /healthz in 120s" >&2
          docker compose --profile keycloak $COMPOSE_FILES ps >&2 || true
          docker compose --profile keycloak $COMPOSE_FILES logs app >&2 || true
          exit 1

      - name: Anonymous smoke — runtime-config exposes OIDC block (mi-rvn)
        # The SPA's Login button is gated on an anonymous GET to
        # /api/v1/runtime-config returning a non-null `oidc` object —
        # this is what tells the navbar that login is wired up. If the
        # endpoint either 401s anonymous callers or omits the oidc
        # block, the Login button never renders and users have no way
        # to authenticate. Assert both: 200 + `oidc` present.
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/rc.json -w '%{http_code}' \
            http://localhost:8080/api/v1/runtime-config)
          if [ "$code" != "200" ]; then
            echo "expected 200 for anonymous runtime-config, got $code" >&2
            cat /tmp/rc.json >&2 || true
            exit 1
          fi
          if ! jq -e '.oidc.client_id and .oidc.issuer_url and .oidc.redirect_uri' \
              /tmp/rc.json >/dev/null; then
            echo "runtime-config missing oidc block; body:" >&2
            cat /tmp/rc.json >&2
            exit 1
          fi
          echo "anonymous runtime-config returned oidc block: $(cat /tmp/rc.json)"

      - name: CSP smoke — connect-src includes Keycloak origin (mi-cl1)
        # Regression guard for mi-cl1: the previous smoke minted tokens
        # via curl, which bypasses the browser CSP entirely — so a
        # CSP with `connect-src 'self'` (forbidding the cross-origin
        # token POST a real SPA makes) passed every assertion while
        # login was broken end-to-end.
        #
        # A headless browser would catch this directly, but the
        # proportionate fix is a structural assertion: read the
        # CSP header from the SPA's index response, find the
        # `connect-src` directive, and check it contains the configured
        # OIDC issuer origin. If it doesn't, a browser would block the
        # token POST and login would fail — fail CI here instead.
        run: |
          set -euo pipefail
          issuer_origin=$(curl -fsS http://localhost:8080/api/v1/runtime-config \
            | jq -r '.oidc.issuer_url' \
            | sed -E 's#^(https?://[^/]+).*#\1#')
          if [ -z "$issuer_origin" ] || [ "$issuer_origin" = "null" ]; then
            echo "could not derive issuer origin from runtime-config" >&2
            exit 1
          fi
          csp=$(curl -fsSI http://localhost:8080/ | tr -d '\r' \
            | awk -F': ' 'tolower($1)=="content-security-policy"{ $1=""; sub(/^ /,""); print }')
          if [ -z "$csp" ]; then
            echo "Content-Security-Policy header missing on SPA response" >&2
            curl -fsSI http://localhost:8080/ >&2
            exit 1
          fi
          connect=$(echo "$csp" | tr ';' '\n' | sed 's/^ *//' \
            | awk '/^connect-src/{print; exit}')
          if [ -z "$connect" ]; then
            echo "no connect-src directive in CSP: $csp" >&2
            exit 1
          fi
          case " $connect " in
            *" $issuer_origin "*)
              echo "connect-src allows $issuer_origin: $connect"
              ;;
            *)
              echo "FAIL: connect-src does not allow OIDC issuer origin $issuer_origin" >&2
              echo "connect-src directive: $connect" >&2
              echo "full CSP: $csp" >&2
              exit 1
              ;;
          esac

      - name: Auth smoke — no token is rejected (401)
        # POST /api/v1/profile is a protected endpoint. Without a
        # bearer token the auth middleware MUST reject it before the
        # handler runs.
        run: |
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -X POST http://localhost:8080/api/v1/profile)
          if [ "$code" != "401" ]; then
            echo "expected 401 for no-token request, got $code" >&2
            exit 1
          fi
          echo "no-token request rejected with 401"

      - name: Auth smoke — real Keycloak token is accepted (200)
        # Mint a token for a seeded test user via the password grant
        # against the dev realm, then call the same protected endpoint
        # with it. A 200 proves the app discovered the realm JWKS,
        # verified the signature, and accepted the `iss` + `aud`
        # claims — the full real-Keycloak path.
        run: |
          set -euo pipefail
          token=$(curl -fsS -X POST \
            http://localhost:8081/realms/minerals/protocol/openid-connect/token \
            -d grant_type=password \
            -d client_id=minerals-test \
            -d username=user1@localhost \
            -d password='MineralsDev123!' \
            -d scope=openid \
            | jq -r '.access_token')
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "failed to obtain a token from Keycloak" >&2
            exit 1
          fi

          # Valid token → profile setup completes → 200.
          code=$(curl -sS -o /tmp/profile.json -w '%{http_code}' \
            -X POST http://localhost:8080/api/v1/profile \
            -H "Authorization: Bearer ${token}" \
            -H 'Content-Type: application/json' \
            -d '{"display_name":"CI Smoke User"}')
          if [ "$code" != "200" ]; then
            echo "expected 200 for valid-token request, got $code" >&2
            cat /tmp/profile.json >&2 || true
            docker compose --profile keycloak $COMPOSE_FILES logs app >&2 || true
            exit 1
          fi
          echo "valid Keycloak token accepted with 200: $(cat /tmp/profile.json)"

          # And a syntactically broken token is still rejected — proves
          # the 200 above came from real verification, not a bypass.
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            http://localhost:8080/api/v1/collectors \
            -H 'Authorization: Bearer not.a.valid.jwt')
          if [ "$code" != "401" ]; then
            echo "expected 401 for malformed-token request, got $code" >&2
            exit 1
          fi
          echo "malformed token rejected with 401"

      - name: docker compose down
        if: always()
        run: docker compose --profile keycloak $COMPOSE_FILES down -v
