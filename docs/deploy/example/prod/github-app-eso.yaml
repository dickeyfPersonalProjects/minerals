# SealedSecret for the GitHub App private key that ESO uses to push the SPA
# publish credentials to the minerals repo's GitHub Actions secrets (mi-1im1).
#
# This is the ONE secret that opts a given environment into publishing. Only
# the env that owns the public SPA bundle should ship it; without it (and the
# patched App IDs in the example/prod/mineral.yaml SecretStore patch) the base
# SecretStore `github-actions` cannot authenticate and pushes nothing. See
# docs/deploy/spa-publish-creds.md.
#
# Consumer contract (base/web-publisher-eso.yaml SecretStore):
#   name: github-app-eso   key: privateKey   value: the App's PEM private key.
#   This Secret carries the PEM key ONLY. The non-secret App ID + installation
#   ID are NOT here — they fill the SecretStore placeholders via the App-ID
#   patch in example/prod/mineral.yaml. Do not put them in this Secret; nothing
#   reads them from it.
#
# This file is the SEALED, committed artifact (safe in git). It follows the
# repo's SealedSecret convention (CONTRACT.md §17 "SealedSecrets & the .sec/
# convention", docs/deploy/encrypt.md): committed = the sealed
# <dir>/<name>.yaml; the PLAINTEXT source lives ONLY at the gitignored
# .sec/github-app-eso.yaml on the operator's workstation.
#
# Provisioning the real value (operator, one-time):
#   1. Create a GitHub App (org or personal account `dickeyfPersonalProjects`)
#      with Repository permission "Secrets: Read and write" (Actions secrets),
#      install it on the `minerals` repo, and note the App ID + installation ID
#      (those go in the example/prod/mineral.yaml App-ID patch — NOT secret).
#   2. Generate a private key for the App and download the .pem.
#   3. Stage the plaintext Secret at docs/deploy/example/prod/.sec/github-app-eso.yaml
#      (gitignored, local-only — never committed). It is an ordinary Opaque
#      Secret carrying just the PEM under stringData.privateKey:
#
#        # docs/deploy/example/prod/.sec/github-app-eso.yaml  (PLAINTEXT — DO NOT COMMIT)
#        apiVersion: v1
#        kind: Secret
#        metadata:
#          name: github-app-eso
#          namespace: mineral-prod
#        type: Opaque
#        stringData:
#          privateKey: |
#            -----BEGIN RSA PRIVATE KEY-----
#            ...the GitHub App's downloaded .pem, verbatim...
#            -----END RSA PRIVATE KEY-----
#
#   4. Seal it into this committed file (ciphertext is namespace-scoped — re-seal
#      per env; set --controller-name/-namespace to this fleet's sealed-secrets
#      install, or use --cert with a saved controller cert):
#
#        kubeseal --format yaml \
#          --controller-name=<sealed-secrets-controller> \
#          --controller-namespace=<ns> \
#          < docs/deploy/example/prod/.sec/github-app-eso.yaml \
#          > docs/deploy/example/prod/github-app-eso.yaml
#
#   See docs/deploy/encrypt.md for the kubeseal workflow and commit rules.
#
# Rotation: generate a new App private key, update .sec/github-app-eso.yaml,
# re-seal, commit. ESO re-auths on its next sync; the pushed Actions secrets are
# unaffected by an App-key rotation (only the MinIO key rotation changes their
# VALUE).
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: github-app-eso
  namespace: mineral-prod
spec:
  encryptedData:
    privateKey: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: github-app-eso
      namespace: mineral-prod
    type: Opaque
