# cert-manager Certificate for the prod Keycloak auth hostname.
#
# The resulting Secret (`secretName` below) is referenced from the
# strategic merge patch in `keycloak-ingress-patch.yaml` as
# `spec.http.tlsSecret`. The Secret name and the patch's `tlsSecret`
# value must match exactly.
#
# Mirrors ../../staging/keycloak/certificate.yaml — only the dnsNames
# and namespace differ.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-tls
  namespace: mineral-prod
spec:
  dnsNames:
    - auth.example.com
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
  secretName: keycloak-tls
