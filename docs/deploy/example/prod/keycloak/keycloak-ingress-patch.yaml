# Strategic merge patch on the prod Keycloak CR from
# `kustomize/base/keycloak/keycloak.yaml`. Supplies the four blocks
# the base deliberately omits:
#
#   - db.host           — the env's CNPG RW service hostname.
#   - hostname.hostname — the public auth URL clients will see.
#   - http.tlsSecret    — name of the cert-manager-issued Secret (must
#                         match `secretName` in certificate.yaml).
#   - ingress           — enables the operator-managed Ingress and lets
#                         you bolt on cluster-specific annotations.
#
# Pair this with a second patch on the `Database` CR setting
# `spec.cluster.name` to the prod CNPG `Cluster` name (the base ships
# a placeholder). See ../../../keycloak.md for the full overlay shape.
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
spec:
  db:
    host: minerals-pg-rw.mineral-prod.svc.cluster.local
  hostname:
    hostname: auth.example.com
  http:
    httpEnabled: true
    tlsSecret: keycloak-tls
  ingress:
    enabled: true
    annotations:
      example: value
