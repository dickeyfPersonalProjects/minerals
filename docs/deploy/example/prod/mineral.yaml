# Flux Kustomization for prod.
#
# Mirrors staging/mineral.yaml. Two intentional differences:
#   - targetNamespace + name suffix (mineral-prod)
#   - images[0].newTag is `prod` instead of `staging`
#
# The ConfigMap patch setting ENV is INCLUDED here even though the base's
# default is already `prod`. This is the consistency fix called out in the
# example: the live fleet-infra has the patch only in staging, which means
# the two overlays drift in shape and a future env added by copy-paste
# could accidentally inherit `ENV: prod` from the base. Keeping the patch
# present and explicit in every env makes the overlay's behavior obvious
# from the file itself, with no need to cross-reference the base default.
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: mineral-prod
  namespace: flux-system
spec:
  interval: 10m0s
  force: true
  prune: true
  path: ./kustomize/base
  targetNamespace: mineral-prod
  sourceRef:
    kind: GitRepository
    name: minerals-repo
  images:
    - name: ghcr.io/dickeyfpersonalprojects/minerals
      newTag: prod
  patches:
    - target:
        kind: ConfigMap
        name: minerals-config
      patch: |-
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: minerals-config
        data:
          ENV: prod
    # OIDC config. Hostname-dependent, so it lives in the overlay
    # rather than the base. Backend is a pure resource server and
    # validates JWTs via Keycloak's JWKS endpoint — no client_secret
    # is needed (see CONFIG.md, "Prod routing"). The PUBLIC_OIDC_*
    # entries are read by the backend and served to the SPA at
    # runtime. Replace example.com with the env's real hostname.
    - target:
        kind: ConfigMap
        name: minerals-config
      patch: |-
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: minerals-config
        data:
          OIDC_ISSUER_URL: https://auth.example.com/realms/minerals
          OIDC_CLIENT_ID: minerals-frontend
          PUBLIC_OIDC_REDIRECT_URI: https://www.example.com/auth/callback
    # CNPG backup → in-cluster MinIO (mi-jgzi). Prod-only; staging has
    # no Cluster patch and therefore no backups. The companion resources
    # (bucket-init Job, ScheduledBackup, dedicated SealedSecret) are
    # listed in kustomization.yaml.
    #
    # Storage choice (in-cluster MinIO) is deliberately limited:
    #   - Protects against bad migrations, accidental DELETE/UPDATE,
    #     and app-level data corruption via point-in-time recovery.
    #   - Does NOT protect against catastrophic cluster loss (the
    #     backup lives on the same cluster). Migration to external
    #     S3 (B2/AWS/etc.) is a two-field swap on this patch when
    #     scale + risk justify the cost; see docs/deploy/restore.md
    #     "Migrating to external storage".
    #
    # endpointURL: short DNS works because the Cluster and MinIO
    # Tenant are both in mineral-prod. Headless service name follows
    # the MinIO Operator's `<tenant>-hl` convention (same as
    # configmap.yaml's S3_ENDPOINT for the app).
    #
    # destinationPath uses an s3:// URI with no key prefix — Barman
    # lays out its own `<cluster-name>/base/` and `<cluster-name>/wals/`
    # subtrees under the bucket root.
    #
    # retentionPolicy '30d' bounds storage growth; older base backups
    # AND the WAL needed to bridge to them are pruned by CNPG.
    - target:
        kind: Cluster
        name: minerals-pg
      patch: |-
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: minerals-pg
        spec:
          backup:
            barmanObjectStore:
              destinationPath: s3://minerals-postgres-backups/
              endpointURL: http://minerals-hl:9000
              s3Credentials:
                accessKeyId:
                  name: minerals-pg-backup-creds
                  key: ACCESS_KEY_ID
                secretAccessKey:
                  name: minerals-pg-backup-creds
                  key: SECRET_ACCESS_KEY
              wal:
                compression: gzip
              data:
                compression: gzip
            retentionPolicy: "30d"
