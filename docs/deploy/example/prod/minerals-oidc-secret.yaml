# SealedSecret for the BFF's OIDC confidential-client secret in prod
# (mi-1d5i). Same key/value contract as staging — see
# staging/minerals-oidc-secret.yaml. Re-encrypt per env: ciphertext is
# namespace-scoped.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: minerals-oidc-secret
  namespace: mineral-prod
spec:
  encryptedData:
    OIDC_CLIENT_SECRET: REPLACE_WITH_KUBESEAL_OUTPUT
    OAUTH_STATE_HMAC_KEY: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: minerals-oidc-secret
      namespace: mineral-prod
    type: Opaque
