# SealedSecret for the BFF backend's confidential OIDC client secret
# (mi-1d5i — V2 BFF auth migration).
#
# Consumed by the app `Deployment` in `kustomize/base/deployment.yaml`
# via `envFrom: secretRef`. The decrypted Secret must contain exactly
# one key, named to match the env var the app reads — no key remapping:
#
#     OIDC_CLIENT_SECRET
#
# Provisioning workflow:
#   1. `terraform apply -var-file=prod.tfvars` provisions the
#      Keycloak `minerals-frontend` client as CONFIDENTIAL and
#      Keycloak generates its `client_secret`.
#   2. `cd terraform/keycloak && terraform output -raw frontend_client_secret`
#      retrieves the secret value.
#   3. Stage the plaintext Secret in `.sec/minerals-oidc-secret.yaml`
#      with `stringData.OIDC_CLIENT_SECRET: <value>` and
#      `metadata.namespace: mineral-prod`.
#   4. Run `kubeseal` to produce the encrypted manifest — see
#      ../../encrypt.md.
#   5. Commit ONLY the encrypted output (this file).
#
# Ciphertext is bound to namespace + name (`mineral-prod` +
# `minerals-oidc-secret`); staging and prod require separate
# kubeseal passes.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: minerals-oidc-secret
  namespace: mineral-prod
spec:
  encryptedData:
    OIDC_CLIENT_SECRET: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: minerals-oidc-secret
      namespace: mineral-prod
    type: Opaque
