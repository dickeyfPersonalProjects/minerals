# cert-manager Certificate for the prod hostname. Same shape as staging
# — only the dnsName and namespace differ.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: web-crt
  namespace: mineral-prod
spec:
  dnsNames:
    - mineral.dickey.cloud
  issuerRef:
    kind: ClusterIssuer
    name: dickey-cloud-issuer
  secretName: web-crt
