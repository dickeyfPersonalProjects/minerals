# cert-manager Certificate for the prod hostname. Same shape as staging
# — only the dnsName and namespace differ.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: web-crt
  namespace: mineral-prod
spec:
  dnsNames:
    - www.example.com
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
  secretName: web-crt
