# SealedSecret for the app's S3 (MinIO IAM) credentials in prod. Same
# key/value contract as staging — see staging/minerals-s3-creds.yaml.
# Re-encrypt per env: ciphertext is namespace-scoped.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: minerals-s3-creds
  namespace: mineral-prod
spec:
  encryptedData:
    S3_ACCESS_KEY_ID: REPLACE_WITH_KUBESEAL_OUTPUT
    S3_SECRET_ACCESS_KEY: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: minerals-s3-creds
      namespace: mineral-prod
    type: Opaque
