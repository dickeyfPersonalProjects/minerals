# Example per-cluster GitOps overlay for Keycloak.
#
# Layers the three env-specific resources on top of the env-agnostic
# base at `kustomize/base/keycloak/`:
#
#   - keycloak-db-secret.yaml      — SealedSecret with the DB creds.
#   - certificate.yaml             — TLS cert for the public auth host.
#   - keycloak-ingress-patch.yaml  — adds hostname / http / ingress on
#                                    the Keycloak CR.
#
# Keycloak is cluster-scoped, not per-minerals-env, so this overlay
# lives alongside the cluster's other infra (not under the per-env
# staging/ + prod/ pair that targets the minerals app). It is
# intentionally not aggregated by ../kustomization.yaml.
#
# The relative path to the base works inside this repo. In a real
# fleet-infra checkout the base is usually pulled by remote ref —
# see ../../keycloak.md for the `?ref=<tag>` form.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: keycloak
resources:
  - ../../../../kustomize/base/keycloak
  - keycloak-db-secret.yaml
  - certificate.yaml
patches:
  - path: keycloak-ingress-patch.yaml
    target:
      kind: Keycloak
      name: keycloak
