# ServiceMonitor — tells the Prometheus Operator to scrape the
# minerals app's `/metrics` endpoint on the admin port (mi-2b1k).
#
# The Prometheus Operator selects ServiceMonitors via the active
# Prometheus CR's `serviceMonitorSelector`. The `release` label below
# matches the kube-prometheus-stack Helm chart's default selector. If
# this cluster's Prometheus uses a different selector — verify with:
#
#   kubectl get prometheus -A -o jsonpath='{.items[*].spec.serviceMonitorSelector}'
#
# — adjust the labels accordingly. Mismatch = silent no-scrape (the
# CR is applied, but Prometheus never picks it up).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: minerals
  namespace: mineral-staging
  labels:
    # kube-prometheus-stack's default serviceMonitorSelector. Verify
    # this cluster's actual value before relying on it.
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: minerals
  endpoints:
    - port: admin            # named port from kustomize/base/service.yaml
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
