# SealedSecret for the staging Keycloak database credentials.
#
# Consumed by `kustomize/base/keycloak/keycloak.yaml` via
# `spec.db.usernameSecret` and `spec.db.passwordSecret` — both point at
# this Secret's `username` and `password` keys.
#
# The `username` value MUST match the `spec.owner` field on the CNPG
# `Database` CR in the base (`keycloak` by default); otherwise the
# operator will provision a role the Keycloak CR can't authenticate as.
#
# Provisioning workflow (see ../../../encrypt.md for full kubeseal
# mechanics):
#   1. Stage the plaintext Secret in `.sec/keycloak-db-staging.yaml`
#      with the two keys below.
#   2. Run `kubeseal` against the staging cluster's sealed-secrets
#      controller to produce the encrypted manifest.
#   3. Commit ONLY the encrypted output (this file).
#
# Ciphertext is bound to the namespace + name pair, so prod and staging
# each need their own sealing pass — the placeholder values below are
# not usable as-is.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: keycloak-db
  namespace: mineral-staging
spec:
  encryptedData:
    username: REPLACE_WITH_KUBESEAL_OUTPUT
    password: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: keycloak-db
      namespace: mineral-staging
    type: Opaque
