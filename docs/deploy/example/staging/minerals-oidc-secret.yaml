# SealedSecret for the BFF backend's confidential OIDC client secret +
# OAuth state HMAC key (mi-1d5i — V2 BFF auth migration).
#
# Consumed by the app `Deployment` in `kustomize/base/deployment.yaml`
# via `envFrom: secretRef`. The decrypted Secret carries two keys,
# both named to match the env vars the app reads (no key remapping):
#
#     OIDC_CLIENT_SECRET     — minerals-frontend confidential client secret
#     OAUTH_STATE_HMAC_KEY   — 32-byte HMAC key for the BFF state cookie
#
# Provisioning workflow:
#   1. `terraform apply -var-file=staging.tfvars` provisions the
#      Keycloak `minerals-frontend` client as CONFIDENTIAL and
#      Keycloak generates its `client_secret`.
#   2. `cd terraform/keycloak && terraform output -raw frontend_client_secret`
#      retrieves the secret value.
#   3. Generate a fresh HMAC key — operator-owned, NOT from Terraform:
#        openssl rand -base64 32
#   4. Stage the plaintext Secret in `.sec/minerals-oidc-secret.yaml`
#      with both keys under `stringData` and `metadata.namespace:
#      mineral-staging`.
#   5. Run `kubeseal` to produce the encrypted manifest — see
#      ../../encrypt.md.
#   6. Commit ONLY the encrypted output (this file).
#
# Ciphertext is bound to namespace + name (`mineral-staging` +
# `minerals-oidc-secret`); staging and prod require separate
# kubeseal passes.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: minerals-oidc-secret
  namespace: mineral-staging
spec:
  encryptedData:
    OIDC_CLIENT_SECRET: REPLACE_WITH_KUBESEAL_OUTPUT
    OAUTH_STATE_HMAC_KEY: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: minerals-oidc-secret
      namespace: mineral-staging
    type: Opaque
