# SealedSecret for the BFF's OIDC confidential-client secret (mi-1d5i).
#
# Consumed by the app Deployment in kustomize/base/deployment.yaml via
# `envFrom: secretRef` (optional: true — the pod boots cleanly when the
# Secret is absent, and the BFF auth handlers stay unregistered until
# both keys are populated, leaving the SPA on the legacy PKCE path).
# The decrypted Secret MUST contain exactly these two keys, named to
# match the env vars the app reads — no key remapping (CONTRACT.md §15):
#
#     OIDC_CLIENT_SECRET     # from Terraform output `frontend_client_secret`
#     OAUTH_STATE_HMAC_KEY   # operator-generated, 32-byte minimum
#
# Provisioning workflow:
#   1. Apply Terraform (`docs/deploy/keycloak.md` § "Running the
#      Terraform module"). `terraform output -raw frontend_client_secret`
#      yields the Keycloak-generated value.
#   2. Generate a 32+ byte random key for OAUTH_STATE_HMAC_KEY, e.g.
#      `openssl rand -hex 32`. Treat as a long-lived secret; rotation
#      invalidates in-flight logins (`400 invalid_state`, users retry).
#   3. Stage the plaintext Secret in `.sec/minerals-oidc-secret.yaml`.
#   4. Run `kubeseal` to produce the encrypted manifest — see ../../encrypt.md.
#   5. Commit ONLY the encrypted output (this file).
#
# CUTOVER ORDER (mi-ron5): this SealedSecret MUST be sealed, committed,
# and reconciled by Flux BEFORE the Terraform PUBLIC→CONFIDENTIAL flip
# is applied. Once the Keycloak client is confidential, the backend can
# only exchange auth codes when it holds the matching secret.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: minerals-oidc-secret
  namespace: mineral-staging
spec:
  encryptedData:
    OIDC_CLIENT_SECRET: REPLACE_WITH_KUBESEAL_OUTPUT
    OAUTH_STATE_HMAC_KEY: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: minerals-oidc-secret
      namespace: mineral-staging
    type: Opaque
